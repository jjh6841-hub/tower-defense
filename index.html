<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>타워 디펜스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark:       #0a0e1a;
  --bg-panel:      #111827;
  --bg-card:       #1a2332;
  --border:        #2a3f5f;
  --accent-blue:   #3b82f6;
  --accent-green:  #10b981;
  --accent-yellow: #f59e0b;
  --accent-red:    #ef4444;
  --text-primary:  #f1f5f9;
  --text-secondary:#94a3b8;
}
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
html {
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
}
body {
  width: 100%; height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
  background: var(--bg-dark);
  font-family: 'Noto Sans KR', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
}

/* ─── LAYOUT ─────────────────────────────────────────────────── */
#screen-game {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;   /* 초기 숨김 — startNewGame() 시 flex로 전환 */
  -webkit-flex-direction: column;
  flex-direction: column;
  background: var(--bg-dark);
}
#canvas-area {
  -webkit-flex: 1;
  flex: 1;
  min-height: 0;
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-align-items: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}
canvas {
  display: block;
  touch-action: none;
  -ms-touch-action: none;
}

/* ─── OVERLAY SCREENS (results + shop) ───────────────────────── */
.overlay-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,14,26,0.97);
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
  z-index: 999;
  padding: 24px 16px 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.overlay-screen.show {
  display: -webkit-flex;
  display: flex;
}

/* ── Results screen ── */
#results-screen {
  -webkit-justify-content: center;
  justify-content: center;
  gap: 20px;
}
#results-screen h1 {
  font-size: clamp(36px, 10vw, 56px);
  color: #ef4444;
  text-shadow: 0 0 20px #ef4444, 0 0 50px #dc2626;
  font-weight: 900;
  letter-spacing: 3px;
  text-align: center;
}
.result-stats {
  width: 100%;
  max-width: 320px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px 0;
}
.stat-row {
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-align-items: center;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  font-size: clamp(14px, 4vw, 17px);
  color: var(--text-secondary);
}
.stat-row:last-child { border-bottom: none; }
.stat-val {
  font-weight: 700;
  color: var(--text-primary);
  font-size: clamp(16px, 4.5vw, 20px);
}

/* ── Home screen (홈/상점) ── */
#screen-home {
  -webkit-justify-content: flex-start;
  justify-content: flex-start;
  gap: 0;
}
.shop-title {
  font-size: clamp(22px, 7vw, 32px);
  color: var(--accent-yellow);
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.shop-currency {
  display: -webkit-flex;
  display: flex;
  gap: 24px;
  font-size: clamp(15px, 4.5vw, 18px);
  font-weight: 700;
  margin-bottom: 18px;
  color: #f0f9ff;
}
.shop-items {
  width: 100%;
  max-width: 420px;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.shop-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-align-items: center;
  align-items: center;
  gap: 10px;
}
.si-info {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 2px;
  -webkit-flex: 1;
  flex: 1;
}
.si-name  { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.si-level { font-size: 11px; color: var(--text-secondary); }
.si-effect{ font-size: 12px; color: var(--text-secondary); }
.si-btn {
  background: var(--accent-blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 700;
  min-height: 44px;
  min-width: 66px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: inherit;
  white-space: nowrap;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}
.si-btn:active { filter: brightness(0.85); }
.si-btn.disabled { opacity: 0.32; pointer-events: none; }

/* ── Shop unlock section ── */
#unlock-section {
  width: 100%;
  max-width: 420px;
  margin-bottom: 14px;
}
.unlock-title {
  font-size: 12px;
  font-weight: 700;
  color: #a78bfa;
  letter-spacing: 1px;
  padding: 2px 0 8px;
}
.unlock-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 13px;
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-align-items: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.unlock-item.owned { opacity: 0.42; border-color: var(--border); }
.ui-info { -webkit-flex: 1; flex: 1; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 2px; }
.ui-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.ui-desc { font-size: 11px; color: var(--text-secondary); }
.ui-btn {
  background: #7c3aed;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 700;
  min-height: 42px;
  min-width: 58px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: inherit;
  white-space: nowrap;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}
.ui-btn:active { filter: brightness(0.85); }
.ui-btn.disabled  { opacity: 0.32; pointer-events: none; }
.ui-btn.owned-btn { background: var(--bg-card); color: var(--accent-green); pointer-events: none; }

/* ── Shared overlay button ── */
.ov-btn {
  background: var(--accent-green);
  color: #fff;
  font-size: clamp(16px, 5vw, 20px);
  font-weight: 700;
  border: none;
  border-radius: 12px;
  padding: 14px 48px;
  min-height: 54px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: inherit;
  letter-spacing: 1px;
  width: 100%;
  max-width: 320px;
}
.ov-btn:active { filter: brightness(0.85); }
.ov-btn.blue { background: var(--accent-blue); }

/* ─── IN-GAME UPGRADE PANEL ─────────────────────────────────── */
#screen-shop {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #030b10;
  border-top: 1px solid rgba(0,255,255,0.20);
  z-index: 5;
  pointer-events: auto;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
}
/* ── Tab bar ── */
#tab-bar {
  display: -webkit-flex;
  display: flex;
  height: 30px;
  background: #030b10;
  border-bottom: 1px solid #0a2233;
  -webkit-align-items: center;
  align-items: center;
}
.tab-btn {
  -webkit-flex: 1;
  flex: 1;
  background: #030b10;
  border: none;
  border-right: 1px solid #0a2233;
  border-bottom: 1px solid transparent;
  color: #334455;
  font-size: 10px;
  font-weight: 700;
  height: 30px;
  padding: 0 4px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  text-transform: uppercase;
  -webkit-transition: color 0.12s, border-color 0.12s;
  transition: color 0.12s, border-color 0.12s;
}
.tab-btn:last-of-type { border-right: none; }
.tab-btn.active {
  color: #00ffff;
  border-bottom-color: #00ffff;
  background: #030b10;
}
/* ── Card row ── */
#tab-content {
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 6px 6px 8px;
  scrollbar-width: none;
  background: #030b10;
}
#tab-content::-webkit-scrollbar { display: none; }
.tab-pane { display: none; }
.tab-pane.active {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: row;
  flex-direction: row;
  -webkit-flex-wrap: nowrap;
  flex-wrap: nowrap;
  gap: 6px;
  width: -webkit-max-content;
  width: max-content;
  min-height: 78px;
}

/* ── Upgrade card — corner-bracket style ── */
.upg-card {
  /* size */
  width: 72px !important;
  height: 72px !important;
  min-width: 72px !important;
  max-width: 72px !important;
  box-sizing: border-box !important;
  padding: 4px 5px !important;
  /* appearance */
  --cc: rgba(0,255,255,0.60);   /* corner color variable */
  background-color: #030b10 !important;
  background-image:
    linear-gradient(var(--cc), var(--cc)),
    linear-gradient(var(--cc), var(--cc)),
    linear-gradient(var(--cc), var(--cc)),
    linear-gradient(var(--cc), var(--cc)),
    linear-gradient(var(--cc), var(--cc)),
    linear-gradient(var(--cc), var(--cc)),
    linear-gradient(var(--cc), var(--cc)),
    linear-gradient(var(--cc), var(--cc)) !important;
  background-size:
    8px 1px, 1px 8px,
    8px 1px, 1px 8px,
    8px 1px, 1px 8px,
    8px 1px, 1px 8px !important;
  background-position:
    0 0,   0 0,
    100% 0,   100% 0,
    0 100%,   0 100%,
    100% 100%,  100% 100% !important;
  background-repeat: no-repeat !important;
  border: none !important;
  border-radius: 0 !important;
  /* layout */
  display: -webkit-flex !important;
  display: flex !important;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: 'Courier New', monospace;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.upg-card:active {
  --cc: rgba(0,255,255,1);
  background-color: #001a22 !important;
}
.upg-card.no-gold {
  --cc: rgba(239,68,68,1);
  opacity: 1 !important;
}

/* 아이콘 숨김 */
.card-icon { display: none !important; }
.card-tag  { display: none !important; }

/* 이름 */
.card-name {
  font-size: 9px !important;
  font-weight: 400;
  color: #0099bb;
  text-align: center;
  line-height: 1.1;
  width: 100%;
  border-bottom: 1px solid #0a2233;
  padding-bottom: 3px;
  font-family: 'Courier New', monospace;
}
/* 수치 */
.card-stat {
  font-size: 14px !important;
  font-weight: 700 !important;
  color: #00ffff;
  text-align: center;
  line-height: 1;
  -webkit-flex: 1;
  flex: 1;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  width: 100%;
  border-bottom: 1px solid #0a2233;
  font-family: 'Courier New', monospace;
}
/* 비용 */
.card-cost {
  font-size: 9px !important;
  color: #f59e0b;
  text-align: center;
  width: 100%;
  line-height: 1;
  font-family: 'Courier New', monospace;
}
.upg-card.no-gold .card-cost { color: #ef4444; }

/* 호환 클래스 */
.upgrade-btn {
  width: 72px !important;
  height: 72px !important;
  font-size: 9px !important;
}

/* ── 해금 후 글로우 애니메이션 ── */
@-webkit-keyframes cardGlow {
  0%,100% { --cc: rgba(0,255,255,0.6); }
  50%      { --cc: rgba(204,68,255,1); box-shadow: 0 0 12px rgba(204,68,255,0.7); }
}
@keyframes cardGlow {
  0%,100% { --cc: rgba(0,255,255,0.6); }
  50%      { --cc: rgba(204,68,255,1); box-shadow: 0 0 12px rgba(204,68,255,0.7); }
}
.card-highlight {
  -webkit-animation: cardGlow 0.5s ease-in-out 3;
  animation: cardGlow 0.5s ease-in-out 3;
}

/* ── Shop flash ── */
#shop-flash {
  font-size: 13px;
  color: #4ade80;
  font-weight: 700;
  min-height: 20px;
  margin-bottom: 6px;
  opacity: 0;
  -webkit-transition: opacity 0.25s;
  transition: opacity 0.25s;
}
#shop-flash.show { opacity: 1; }

/* wave banner is now rendered on canvas — no HTML element needed */

/* ─── HOME SCREEN ────────────────────────────────────────────── */
/* overlay-screen 공통 스타일 덮어쓰기 */
#screen-home {
  background: #030b10 !important;
  padding: 0 !important;
  overflow: hidden !important;
  -webkit-align-items: stretch !important;
  align-items: stretch !important;
}
#home-root {
  width: 100%; height: 100%;
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  position: relative; overflow: hidden;
}
/* 배경 그리드 */
#home-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none; z-index: 0;
}
/* ── 상단 HUD 바 ── */
#home-hud {
  height: 44px; flex-shrink: 0;
  background: #040c14;
  border-bottom: 1px solid rgba(0,255,255,0.30);
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  padding: 0 14px; gap: 0;
  position: relative; z-index: 1;
}
#home-hud-gold { font-size: 14px; color: #f59e0b; font-weight: 700; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 4px; }
#home-hud-gems { font-size: 14px; color: #00ffff; font-weight: 700; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 4px; -webkit-flex: 1; flex: 1; -webkit-justify-content: center; justify-content: center; }
#home-hud-arrow { background: none; border: none; color: #64748b; font-size: 13px; cursor: pointer; padding: 4px; font-family: inherit; }
/* ── 메인 영역 ── */
#home-main {
  -webkit-flex: 1; flex: 1; min-height: 0;
  display: -webkit-flex; display: flex;
  -webkit-align-items: flex-start; align-items: flex-start;
  position: relative; z-index: 1;
}
/* ── 좌/우 사이드 아이콘 ── */
#home-left, #home-right {
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-align-items: center; align-items: center;
  gap: 8px; padding: 16px 6px; flex-shrink: 0;
}
.hm-icon-wrap {
  width: 44px; height: 44px;
  background: rgba(4,12,20,0.85);
  border: 1px solid rgba(0,255,255,0.18);
  border-radius: 10px;
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
  position: relative; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.hm-icon-wrap.locked { opacity: 0.35; }
.hm-icon { font-size: 20px; line-height: 1; }
.hm-lock { position: absolute; bottom: 2px; right: 3px; font-size: 8px; line-height: 1; }
.hm-badge {
  position: absolute; top: 4px; right: 4px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #ef4444; color: #fff;
  font-size: 8px; font-weight: 700;
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  -webkit-justify-content: center; justify-content: center;
}
/* 파워스톤 CSS 삼각형 */
.hm-ps-icon {
  width: 0; height: 0;
  border-left: 9px solid transparent;
  border-right: 9px solid transparent;
  border-bottom: 16px solid #00ff88;
  filter: drop-shadow(0 0 4px #00ff88);
}
/* ── 중앙 영역 ── */
#home-center {
  -webkit-flex: 1; flex: 1;
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-align-items: center; align-items: center;
  gap: 10px; padding: 16px 8px 8px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
/* 육각형 타워 아이콘 */
#home-hex-outer {
  width: 90px; height: 52px; position: relative;
  filter: drop-shadow(0 0 10px #00ffff) drop-shadow(0 0 24px rgba(0,255,255,0.35));
}
#home-hex {
  width: 90px; height: 52px;
  border-left: 2px solid #00ffff;
  border-right: 2px solid #00ffff;
  position: relative;
}
#home-hex::before {
  content: ''; position: absolute;
  left: -17px; top: -27px;
  width: 122px; height: 0;
  border-left: 2px solid transparent;
  border-right: 2px solid transparent;
  border-bottom: 27px solid #00ffff;
}
#home-hex::after {
  content: ''; position: absolute;
  left: -17px; bottom: -27px;
  width: 122px; height: 0;
  border-left: 2px solid transparent;
  border-right: 2px solid transparent;
  border-top: 27px solid #00ffff;
}
#home-game-title {
  font-family: 'Courier New', monospace;
  font-size: 24px; font-weight: 700;
  color: #00ffff; letter-spacing: 4px;
  text-shadow: 0 0 10px #00ffff, 0 0 24px #00ffff;
  text-align: center;
}
/* 정보 카드 */
#home-cards {
  display: -webkit-flex; display: flex;
  gap: 8px; width: 100%;
}
.home-card {
  -webkit-flex: 1; flex: 1;
  background: #0a1a2a;
  border: 1px solid #0a3344;
  border-radius: 10px;
  padding: 10px 10px 8px;
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-align-items: center; align-items: center;
  gap: 4px;
}
.home-card-label { font-size: 12px; color: #94a3b8; text-align: center; }
.home-card-value { font-size: 18px; color: #00ffff; font-weight: 700; }
/* 난이도 카드 */
#home-diff-row {
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  gap: 4px; width: 100%;
}
#home-diff-info {
  -webkit-flex: 1; flex: 1;
  display: -webkit-flex; display: flex;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-align-items: center; align-items: center;
  gap: 2px;
}
#h-tier { font-size: 16px; color: #ffffff; font-weight: 700; }
#h-best-wave, #h-coin-mult { font-size: 11px; color: #94a3b8; }
#h-coin-mult { color: #f59e0b; }
.home-diff-arrow {
  background: none; border: none;
  color: #00ffff; font-size: 16px;
  cursor: pointer; padding: 4px 6px;
  font-family: inherit; -webkit-tap-highlight-color: transparent;
}
.home-diff-arrow:active { opacity: 0.6; }
/* 전투 시작 버튼 */
#btn-start-game {
  width: 200px; height: 52px;
  background: #030b10;
  border: 2px solid #cc44ff;
  border-radius: 6px;
  color: #ffffff; font-size: 18px; font-weight: 700;
  text-shadow: 0 0 10px #cc44ff;
  box-shadow: 0 0 16px rgba(204,68,255,0.3), inset 0 0 16px rgba(204,68,255,0.05);
  cursor: pointer; font-family: inherit;
  -webkit-appearance: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-transition: box-shadow 0.1s; transition: box-shadow 0.1s;
}
#btn-start-game:active { box-shadow: 0 0 28px rgba(204,68,255,0.7), inset 0 0 20px rgba(204,68,255,0.15); }
/* ── 하단 네비게이션 ── */
#home-nav {
  height: 56px; flex-shrink: 0;
  background: #040c14;
  border-top: 1px solid #0a2233;
  display: -webkit-flex; display: flex;
  -webkit-align-items: center; align-items: center;
  position: relative; z-index: 1;
}

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════════════════════════ */
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const areaEl = document.getElementById('canvas-area');

let CW = 360, CH = 640; // logical canvas dimensions

/* ── 영구 데이터 (게임 종료 후에도 유지) ── */
let PERM = {
  gold:    10,  // 시작 골드
  gems:    0,
  dmgLv:   0,
  spdLv:   0,
  rngLv:   0,
  hpLv:    0,
  unlocks: {},  // { crit: true, multi: true, ... }
  bestWave:     0,
  totalKills:   0,
  bossKills:    0,
  upgradeCount: 0,
  achievements: {},
  settings: { sound: true, music: true, vibration: true },
};

function loadPerm() {
  try {
    const s = localStorage.getItem('td_perm');
    if (s) {
      const d = JSON.parse(s);
      PERM.gold    = d.gold    ?? 10;
      PERM.gems    = d.gems    ?? 0;
      PERM.dmgLv   = d.dmgLv  ?? 0;
      PERM.spdLv   = d.spdLv  ?? 0;
      PERM.rngLv   = d.rngLv  ?? 0;
      PERM.hpLv    = d.hpLv   ?? 0;
      PERM.unlocks      = (d.unlocks && typeof d.unlocks === 'object') ? d.unlocks : {};
      PERM.bestWave     = d.bestWave     ?? 0;
      PERM.totalKills   = d.totalKills   ?? 0;
      PERM.bossKills    = d.bossKills    ?? 0;
      PERM.upgradeCount = d.upgradeCount ?? 0;
      PERM.achievements = (d.achievements && typeof d.achievements === 'object') ? d.achievements : {};
      PERM.settings     = Object.assign({ sound: true, music: true, vibration: true }, d.settings || {});
    }
  } catch (_) {}
}
function savePerm() {
  try { localStorage.setItem('td_perm', JSON.stringify(PERM)); } catch (_) {}
}

/* ── 상점 아이템 정의 ── */

function checkAchievements() {
  let changed = false;
  for (const ach of ACHIEVEMENTS) {
    if (!PERM.achievements[ach.key] && ach.cond()) {
      PERM.achievements[ach.key] = 'claimed';
      PERM.gems += ach.gems;
      if (G) G.gems = PERM.gems;
      changed = true;
    }
  }
  if (changed) savePerm();
}

function resizeCanvas() {
  const aw = areaEl.clientWidth  || window.innerWidth;
  const ah = areaEl.clientHeight || Math.floor(window.innerHeight * 0.75);
  let w, h;
  if (aw / ah < 9 / 16) {
    w = aw;
    h = Math.floor(aw * 16 / 9);
  } else {
    h = ah;
    w = Math.floor(ah * 9 / 16);
  }
  CW = w; CH = h;
  canvas.width  = w;
  canvas.height = h;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  if (G) {
    G.cx = w / 2;
    G.cy = h / 2;
    G.tower.range = Math.min(w, h) * 0.45;
  }
}
window.addEventListener('resize', resizeCanvas, false);

    betweenTimer: 0,
    killCount:    0,   // enemies killed this run
    goldEarned:   0,   // gold earned this run

    tower: {
      hp:      10,
      maxHp:   10,
      dmg:     3,
      atkMs:   1000,  // ms between shots
      range:   0,
      lastAtk: 0,
      buffMs:  0,     // ms remaining for 2× damage buff
    },

    // Zoom
    rangeLevel:  0,
    zoom:        1.0,
    targetZoom:  1.0,
    flashAlpha:  0,

    // Spawn
    spawnQ:       0,
    spawnTimer:   0,
    spawnIntvl:   800,

    bossSpawned:  false,

    // Entities

    effects: [],

function getTargetZoom() {
  const lvl = G.rangeLevel;
  if (lvl <= 5)  return 1.00;
  if (lvl <= 10) return 0.85;
  if (lvl <= 15) return 0.70;
  if (lvl <= 20) return 0.55;
  return 0.40;
}

/* ═══════════════════════════════════════════════════════════════
   GAME INIT / WAVE START
═══════════════════════════════════════════════════════════════ */
function applyPermStats() {
  const t    = G.tower;
  t.dmg      = 3 + PERM.dmgLv;
  t.atkMs    = Math.max(200, 1000 - PERM.spdLv * 40);
  t.maxHp    = 10 + PERM.hpLv * 2;
  t.hp       = t.maxHp;
  t.range    = Math.min(CW, CH) * 0.45 + PERM.rngLv * 30;
  G.rangeLevel = 5 + PERM.rngLv; // base tier 5 → zoom 1.0 at start
  G.zoom       = getTargetZoom();
  G.targetZoom = G.zoom;
}

function startGame() {
  G = createState();
  G.gold  = PERM.gold;
  G.gems  = PERM.gems;
  G.speed = gameSpeed;
  const _sb = document.getElementById('speed-btn');
  if (_sb) _sb.textContent = G.speed + '×';
  applyPermStats();
  buildCards();
  setActiveTab(activeTab);
  applyPendingHighlight();

  // Daily gem
  try {
    const today = new Date().toDateString();
    if (localStorage.getItem('td_day') !== today) {
      G.gems += 1;
      PERM.gems += 1;
      localStorage.setItem('td_day', today);
      savePerm();
    }
  } catch (_) {}

  startWave();
  loopGen++;
  const gen = loopGen;
  G.lastTime = performance.now();
  requestAnimationFrame(function(ts) { gameLoop(gen, ts); });
}

function startWave() {
  const w = G.wave;
  G.isBossWave  = (w % 5 === 0);
  G.bossSpawned = false;
  G.spawnQ      = 5 + (w - 1) * 3;
  G.spawnIntvl  = Math.max(350, 850 - w * 18); // gets faster with waves
  G.spawnTimer  = G.spawnIntvl;
  G.phase       = 'playing';
}

/* ═══════════════════════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════════════════════ */
function gameLoop(gen, ts) {
  if (gen !== loopGen) return;
  const rawDt = Math.min(ts - G.lastTime, 50);
  G.lastTime = ts;
  const steps = (G.speed > 1 && G.phase === 'playing') ? G.speed : 1;
  for (let i = 0; i < steps; i++) update(rawDt);
  render();
  if (G.phase !== 'gameover') {
    requestAnimationFrame(function(nts) { gameLoop(gen, nts); });
  }
}

/* ═══════════════════════════════════════════════════════════════
   UPDATE
═══════════════════════════════════════════════════════════════ */
function update(dt) {
  if (G.phase === 'gameover' || G.phase === 'paused') return;

  // Zoom smooth transition (~0.3s time constant)
  if (G.zoom !== G.targetZoom) {
    const lf = 1 - Math.exp(-dt / 80);
    G.zoom += (G.targetZoom - G.zoom) * lf;
    if (Math.abs(G.zoom - G.targetZoom) < 0.001) G.zoom = G.targetZoom;
  }


  // Buff countdown
  if (G.tower.buffMs > 0) G.tower.buffMs = Math.max(0, G.tower.buffMs - dt);

  // Regen
  if (G.regenRate > 0) {
    G.regenTimer += dt;
    if (G.regenTimer >= 1000) {
      G.regenTimer -= 1000;
      G.tower.hp = Math.min(G.tower.maxHp, G.tower.hp + G.regenRate);
    }
  }

  // Animate leftover effects even during between phase
  for (let i = G.effects.length - 1; i >= 0; i--) {
    G.effects[i].t += dt;
    if (G.effects[i].t >= 600) G.effects.splice(i, 1);
  }

  // Wave banner timer
  if (G.bannerTimer >= 0) G.bannerTimer += dt;

  // ── Between-wave countdown ──
  if (G.phase === 'between') {
    G.betweenTimer -= dt;
    if (G.betweenTimer <= 0) {
      G.wave++;
      startWave();
    }
    return;
  }

  // ── Spawn enemies ──
  const needBoss = G.isBossWave && !G.bossSpawned && G.spawnQ === 0;
  if (G.spawnQ > 0 || needBoss) {
    G.spawnTimer -= dt;
    if (G.spawnTimer <= 0) {
      if (G.spawnQ > 0) {
        G.enemies.push(mkEnemy(false));
        G.spawnQ--;
        G.spawnTimer = G.spawnIntvl;
      } else if (G.isBossWave && !G.bossSpawned) {
        G.enemies.push(mkEnemy(true));
        G.bossSpawned = true;
      }
    }
  }

  // ── Tower fires ──
  G.tower.lastAtk += dt;
  if (G.tower.lastAtk >= G.tower.atkMs) {
    G.tower.lastAtk -= G.tower.atkMs;
    fireTower();
  }

  // ── Move bullets ──
  const bSpd = Math.min(CW, CH) * 0.022; // px per frame @60fps
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    const mv = bSpd * (dt / 16.667);
    b.x += b.dx * mv;
    b.y += b.dy * mv;

    if (b.x < -80 || b.x > CW + 80 || b.y < -80 || b.y > CH + 80) {
      G.bullets.splice(i, 1);
      continue;
    }

    let removeBullet = false;
    for (let j = G.enemies.length - 1; j >= 0; j--) {
      const e = G.enemies[j];
      if (b.hitSet && b.hitSet.has(e)) continue; // already hit by this piercing bullet
      const ddx = b.x - e.x, ddy = b.y - e.y;
      if (ddx * ddx + ddy * ddy < (e.r + 5) * (e.r + 5)) {
        if (b.hitSet) b.hitSet.add(e);
        let dmg = G.tower.buffMs > 0 ? G.tower.dmg * 2 : G.tower.dmg;
        if (b.crit) dmg *= 2;
        // Slow on hit
        if (G.slowPct > 0) e.slowTimer = 1500;
        e.hp -= dmg;

        if (e.hp <= 0) {
          const gEarned  = Math.floor(e.gold * G.goldBonus);
          const gmEarned = e.gem ? Math.floor(e.gem * G.gemBonus) : 0;
          G.gold       += gEarned;
          G.gems       += gmEarned;
          G.killCount++;
          G.goldEarned += gEarned;
          PERM.totalKills++;
          if (e.boss) PERM.bossKills++;
          // Life steal
          if (G.lifeSteal > 0) {
            G.tower.hp = Math.min(G.tower.maxHp, G.tower.hp + G.lifeSteal);
          }
          // Explosion AOE
          if (G.explodeR > 0) {
            const ex = e.x, ey = e.y;
            const exDmg = Math.max(1, Math.floor(G.tower.dmg * 0.5));
            addFx(ex, ey, G.explodeR, '#f97316');
            for (let k = G.enemies.length - 1; k >= 0; k--) {
              const ek = G.enemies[k];
              if (ek === e) continue;
              const edx = ek.x - ex, edy = ek.y - ey;
              if (edx * edx + edy * edy < G.explodeR * G.explodeR) {
                ek.hp -= exDmg;
                if (ek.hp <= 0) {
                  const ekGold = Math.floor(ek.gold * G.goldBonus);
                  G.gold       += ekGold;
                  G.killCount++;
                  G.goldEarned += ekGold;
                  PERM.totalKills++;
                  if (ek.boss) PERM.bossKills++;
                  addFx(ek.x, ek.y, ek.r * 2.8, '#f97316');
                  G.enemies.splice(k, 1);

                  if (k <= j) j--;
                }
              }
            }
          } else {
            addFx(e.x, e.y, e.r * 2.8, e.boss ? '#f97316' : '#ef4444');
          }
          G.enemies.splice(j, 1);
        }

        // Pierce: bullet keeps going if pierceLeft > 0
        if (b.pierceLeft > 0) {
          b.pierceLeft--;
        } else {
          removeBullet = true;
          break;
        }
      }
    }
    if (removeBullet) G.bullets.splice(i, 1);
  }

  // ── Move enemies toward tower ──
  const TOWER_HIT_R = 18;
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    const dx = G.cx - e.x, dy = G.cy - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < TOWER_HIT_R + e.r) {
      const dmgTaken = Math.max(1, Math.round(1 - G.armor * 0.05));
      G.tower.hp = Math.max(0, G.tower.hp - dmgTaken);
      addFx(e.x, e.y, e.r * 2, '#f87171');
      G.enemies.splice(i, 1);
      if (G.tower.hp <= 0) { triggerGameOver(); return; }
      continue;
    }

    // Slow tick
    if (e.slowTimer > 0) e.slowTimer = Math.max(0, e.slowTimer - dt);
    const spdMult = (e.slowTimer > 0) ? (1 - G.slowPct) : 1;
    const mv = e.spd * spdMult * (dt / 16.667);
    e.x += (dx / dist) * mv;
    e.y += (dy / dist) * mv;
  }

  // ── Check wave complete ──
  const spawnDone = G.spawnQ === 0 && (!G.isBossWave || G.bossSpawned);
  if (spawnDone && G.enemies.length === 0 && G.phase === 'playing') {
    onWaveComplete();
  }

  syncUI();
}

function mkEnemy(isBoss) {
  // Spawn just outside the visible area (accounts for zoom-out world expansion)
  const zoom  = G.zoom;
  const halfW = CW / (2 * zoom); // visible half-width in game coords
  const halfH = CH / (2 * zoom);
  const m     = 50;              // extra margin beyond screen edge
  let x, y;
  const side = (Math.random() * 4) | 0;
  if (side === 0) {        // top
    x = CW/2 + (Math.random() - 0.5) * 2 * (halfW + m);
    y = CH/2 - halfH - m;
  } else if (side === 1) { // bottom
    x = CW/2 + (Math.random() - 0.5) * 2 * (halfW + m);
    y = CH/2 + halfH + m;
  } else if (side === 2) { // left
    x = CW/2 - halfW - m;
    y = CH/2 + (Math.random() - 0.5) * 2 * (halfH + m);
  } else {                 // right
    x = CW/2 + halfW + m;
    y = CH/2 + (Math.random() - 0.5) * 2 * (halfH + m);
  }

  const w       = G.wave;
  const baseHp  = isBoss ? 20 : 2 + (w - 1) * 0.5;          // +0.5 HP per wave
  const baseSpd = isBoss ? 0.51 : 0.81 * Math.pow(1.02, w - 1); // +2% speed per wave

  return {
    x, y,
    boss:      isBoss,
    hp:        baseHp,
    maxHp:     baseHp,
    r:         isBoss ? 17  : 9,
    spd:       baseSpd,
    gold:      isBoss ? 5   : 1,
    gem:       isBoss ? 1   : 0,
    slowTimer: 0,
  };
}

function fireTower() {
  let target = null, minD = G.tower.range + 1;
  for (const e of G.enemies) {
    const dx = e.x - G.cx, dy = e.y - G.cy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < minD) { minD = d; target = e; }
  }
  if (!target) return;
  const baseAngle = Math.atan2(target.y - G.cy, target.x - G.cx);
  const shots     = Math.max(1, G.multiShot);
  const spread    = 0.18; // radians between bullets
  for (let s = 0; s < shots; s++) {
    const offset = (s - (shots - 1) / 2) * spread;
    const angle  = baseAngle + offset;
    const isCrit = G.critChance > 0 && Math.random() < G.critChance;
    G.bullets.push({
      x: G.cx, y: G.cy,
      dx: Math.cos(angle), dy: Math.sin(angle),
      crit: isCrit,
      pierceLeft: G.pierce,
      hitSet: G.pierce > 0 ? new Set() : null,
    });
  }
}

function addFx(x, y, maxR, color) {
  G.effects.push({ x, y, maxR, color, t: 0 });
}

function onWaveComplete() {
  G.phase = 'between';
  G.betweenTimer = 2500;
  if (G.wave % 10 === 0) G.gems += 2;
  if (G.wave > PERM.bestWave) { PERM.bestWave = G.wave; savePerm(); }
  checkAchievements();
  const nextW    = G.wave + 1;
  const nextBoss = nextW % 5 === 0;
  G.bannerClear = 'Wave ' + G.wave + ' Clear!';
  G.bannerNext  = 'Wave ' + nextW + (nextBoss ? '  👑' : '');
  G.bannerTimer = 0;
}

function triggerGameOver() {
  G.phase   = 'gameover';
  PERM.gold = G.gold;
  PERM.gems = G.gems;
  savePerm();
  document.getElementById('r-wave').textContent  = G.wave;
  document.getElementById('r-kills').textContent = G.killCount;
  document.getElementById('r-gold').textContent  = '💰 ' + G.goldEarned;
  document.getElementById('results-screen').classList.add('show');
  setTimeout(openShop, 1500); // 1.5초 후 자동으로 상점 이동
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════ */
function render() {
  // ── 1. Background (full canvas, before zoom) ──────────────────
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, CW, CH);

  // ── 2. Game world (zoom transform applied) ────────────────────
  ctx.save();
  ctx.translate(CW / 2, CH / 2);
  ctx.scale(G.zoom, G.zoom);
  ctx.translate(-CW / 2, -CH / 2);

  // Visible game-coord bounds when zoomed out
  const visW = CW / G.zoom;
  const visH = CH / G.zoom;
  const ox   = (CW - visW) / 2; // negative when zoomed out
  const oy   = (CH - visH) / 2;

  // Grid (extended to fill visible area)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  const gs = Math.floor(CW / 9);
  for (let x = Math.floor(ox / gs) * gs; x <= ox + visW + gs; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, oy); ctx.lineTo(x, oy + visH); ctx.stroke();
  }
  for (let y = Math.floor(oy / gs) * gs; y <= oy + visH + gs; y += gs) {
    ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + visW, y); ctx.stroke();
  }

  // Attack range circle
  ctx.beginPath();
  ctx.arc(G.cx, G.cy, G.tower.range, 0, Math.PI * 2);
  ctx.setLineDash([6, 6]);
  ctx.strokeStyle = 'rgba(59,130,246,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(59,130,246,0.03)';
  ctx.fill();
  ctx.setLineDash([]);

  // Targeting line to nearest in-range enemy
  {
    let nearest = null, nd = G.tower.range + 1;
    for (const e of G.enemies) {
      const dx = e.x - G.cx, dy = e.y - G.cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < nd) { nd = d; nearest = e; }
    }
    if (nearest) {
      ctx.save();
      ctx.strokeStyle = 'rgba(251,191,36,0.22)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(G.cx, G.cy);
      ctx.lineTo(nearest.x, nearest.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // Effects (death rings)
  for (const ef of G.effects) {
    const t = ef.t / 600;
    ctx.save();
    ctx.globalAlpha = (1 - t) * 0.85;
    ctx.beginPath();
    ctx.arc(ef.x, ef.y, ef.maxR * t, 0, Math.PI * 2);
    ctx.strokeStyle = ef.color;
    ctx.lineWidth = Math.max(0.5, 3 - t * 2.5);
    ctx.stroke();
    ctx.restore();
  }

  // Enemies
  for (const e of G.enemies) {
    const slowed = e.slowTimer > 0;
    ctx.save();
    ctx.shadowBlur  = e.boss ? 22 : 10;
    ctx.shadowColor = slowed ? '#60a5fa' : (e.boss ? '#f97316' : '#ef4444');
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fillStyle   = slowed ? (e.boss ? '#1e3a8a' : '#1d4ed8') : (e.boss ? '#c2410c' : '#b91c1c');
    ctx.fill();
    ctx.strokeStyle = slowed ? '#93c5fd' : (e.boss ? '#fb923c' : '#f87171');
    ctx.lineWidth   = e.boss ? 2.5 : 1.5;
    ctx.stroke();
    ctx.shadowBlur  = 0;
    if (e.boss) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.floor(e.r * 0.82) + 'px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('B', e.x, e.y);
    }
    const bw = e.r * 2.6, bh = 3;
    const bx = e.x - bw / 2, by = e.y - e.r - bh - 4;
    const hr = e.hp / e.maxHp;
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = hr > 0.6 ? '#16a34a' : hr > 0.3 ? '#ca8a04' : '#dc2626';
    ctx.fillRect(bx, by, bw * hr, bh);
    ctx.restore();
  }

  // Bullets
  for (const b of G.bullets) {
    ctx.save();
    ctx.shadowBlur  = b.crit ? 12 : 8;
    ctx.shadowColor = b.crit ? '#f97316' : '#fbbf24';
    ctx.fillStyle   = b.crit ? '#fb923c' : '#fde68a';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.crit ? 4 : 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Tower
  const TS = 26;
  const buffed = G.tower.buffMs > 0;
  ctx.save();
  ctx.shadowBlur  = 22;
  ctx.shadowColor = buffed ? '#f97316' : '#3b82f6';
  ctx.fillStyle   = buffed ? '#fdba74' : '#7dd3fc';
  ctx.fillRect(G.cx - TS/2, G.cy - TS/2, TS, TS);
  ctx.strokeStyle = buffed ? '#ea580c' : '#2563eb';
  ctx.lineWidth   = 3;
  ctx.strokeRect(G.cx - TS/2, G.cy - TS/2, TS, TS);
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = buffed ? '#9a3412' : '#1e40af';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(G.cx, G.cy - TS/2 + 6); ctx.lineTo(G.cx, G.cy + TS/2 - 6);
  ctx.moveTo(G.cx - TS/2 + 6, G.cy); ctx.lineTo(G.cx + TS/2 - 6, G.cy);
  ctx.stroke();
  ctx.restore();

  ctx.restore(); // ← end zoom transform

  // ── 3. Wave clear banner (canvas text, no zoom) ───────────────
  if (G.bannerTimer >= 0 && G.bannerTimer < 1900) {
    const t = G.bannerTimer;
    let text, alpha;
    if (t < 800) {
      text = G.bannerClear; alpha = 1;
    } else if (t < 1300) {
      text = G.bannerClear; alpha = 1 - (t - 800) / 500;
    } else if (t < 1600) {
      text = G.bannerNext;  alpha = 1;
    } else {
      text = G.bannerNext;  alpha = 1 - (t - 1600) / 300;
    }
    ctx.save();
    ctx.globalAlpha   = Math.max(0, alpha);
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.font          = 'bold 22px Arial';
    ctx.fillStyle     = '#ffffff';
    ctx.shadowBlur    = 0;
    ctx.fillText(text, CW / 2, CH * 0.40);
    ctx.restore();
  }

  // ── 4. Tower stats popup ─────────────────────────────────────
  renderTowerPopup();

  // ── 5. HUD (full screen, no zoom) ────────────────────────────
  renderHUD();
}

function renderTowerPopup() {
  if (!G || !G.showTowerStats) return;
  const lines = [
    '⚔️ 공격력: ' + G.tower.dmg,
    '⚡ 속도: '   + (G.tower.atkMs / 1000).toFixed(2) + 's',
    '🎯 범위: '   + Math.round(G.tower.range),
    '🛡️ 방어구: ' + G.armor,
    '❤️ HP: '     + Math.ceil(G.tower.hp) + '/' + G.tower.maxHp,
  ];
  if (G.lifeSteal > 0) lines.push('🩸 흡혈: ' + G.lifeSteal);
  if (G.critChance > 0) lines.push('💥 치명타: ' + Math.round(G.critChance * 100) + '%');

  const lineH = 18, popW = 160, popPad = 8;
  const popH  = lines.length * lineH + popPad * 2;
  const popX  = CW / 2 - popW / 2;
  const popY  = CH / 2 - 13 - 12 - popH;

  ctx.save();
  ctx.fillStyle = 'rgba(8,16,38,0.93)';
  rrect(popX, popY, popW, popH, 8);
  ctx.strokeStyle = 'rgba(74,138,255,0.4)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(popX, popY, popW, popH, 8); else ctx.rect(popX, popY, popW, popH);
  ctx.stroke();
  ctx.font         = '11px Arial';
  ctx.fillStyle    = '#93c5fd';
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], popX + popPad, popY + popPad + i * lineH);
  }
  ctx.restore();
}

function rrect(x, y, w, h, r) {
  if (w <= 0 || h <= 0) return;
  ctx.beginPath();
  if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); }
  else { ctx.rect(x, y, w, h); }
  ctx.fill();
}

function renderHUD() {
  const pad  = 8;
  const panH = 50;

  ctx.save();

  // ── HUD background panel ──
  ctx.fillStyle = 'rgba(10,14,26,0.82)';
  ctx.fillRect(0, 0, CW, panH);

  // ── Wave label ──
  ctx.textBaseline = 'middle';
  ctx.font         = '700 13px "Noto Sans KR", Arial';
  ctx.fillStyle    = '#94a3b8';
  ctx.fillText('Wave ' + G.wave + (G.isBossWave ? '  👑' : ''), pad, pad + 7);

  // ── HP bar (4px, rounded) ──
  const barW = Math.floor(CW * 0.36);
  const barH = 4;
  const barX = pad;
  const barY = pad + 22;
  const hr   = G.tower.hp / G.tower.maxHp;

  ctx.fillStyle = '#1e293b';
  rrect(barX, barY, barW, barH, 2);
  ctx.fillStyle = '#10b981';  // always green; red glow when low
  if (hr <= 0.25) ctx.fillStyle = '#ef4444';
  else if (hr <= 0.5) ctx.fillStyle = '#f59e0b';
  rrect(barX, barY, Math.max(0, barW * hr), barH, 2);

  ctx.font         = '400 11px "Noto Sans KR", Arial';
  ctx.fillStyle    = '#94a3b8';
  ctx.textBaseline = 'top';
  ctx.fillText(Math.ceil(G.tower.hp) + '/' + G.tower.maxHp, barX, barY + barH + 3);

  // ── Pause button (top right 32×32) ──
  const pbW = 32, pbH = 32;
  const pbX = CW - pad - pbW;
  const pbY = (panH - pbH) / 2;
  _pauseBtnRect = { x: pbX, y: pbY, w: pbW, h: pbH };
  ctx.fillStyle = '#1a2332';
  rrect(pbX, pbY, pbW, pbH, 8);
  ctx.strokeStyle = '#2a3f5f';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(pbX, pbY, pbW, pbH, 8); else ctx.rect(pbX, pbY, pbW, pbH);
  ctx.stroke();
  ctx.font         = '14px Arial';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle    = '#f1f5f9';
  ctx.fillText('⏸', pbX + pbW / 2, pbY + pbH / 2);

  // ── Gold & Gems (right, shifted left of pause btn) ──
  const rightEdge = pbX - 6;
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'middle';
  ctx.font         = '700 13px "Noto Sans KR", Arial';
  ctx.fillStyle    = '#f59e0b';
  ctx.fillText('🪙 ' + G.gold, rightEdge, pad + 7);
  ctx.fillStyle    = '#a78bfa';
  ctx.fillText('💎 ' + G.gems, rightEdge, pad + 24);
  ctx.textAlign    = 'left';

  // ── Buff timer ──
  if (G.tower.buffMs > 0) {
    const sec = Math.ceil(G.tower.buffMs / 1000);
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = 'bold 11px Arial';
    ctx.fillStyle    = '#fb923c';
    ctx.fillText('⚡ x2  ' + sec + 's', CW / 2, pad + 8);
    ctx.textAlign = 'left';
  }

  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   IN-GAME UPGRADES (임시) — 탭 시스템
═══════════════════════════════════════════════════════════════ */
let activeTab = 'atk';
let _pendingHighlight = null;

function isUnlocked(key) {
  return !key || !!PERM.unlocks[key];
}

function buildCards() {
  for (const tabKey of ['atk', 'def', 'spc']) {
    const pane = document.getElementById('pane-' + tabKey);
    if (!pane) continue;
    pane.innerHTML = '';
    for (const upg of UPGRADES) {
      if (upg.tab !== tabKey) continue;
      if (!isUnlocked(upg.unlock)) continue; // 잠긴 항목은 표시 안 함
      const btn = document.createElement('button');
      btn.id        = 'upg-card-' + upg.key;
      btn.className = 'upg-card upgrade-btn';
      const statText = G ? upg.stat() : '-';
      btn.innerHTML =
        '<span class="card-icon">'  + upg.icon + '</span>' +
        '<span class="card-name">'  + upg.name + '</span>' +
        '<span class="card-stat" id="cs-' + upg.key + '">' + statText + '</span>' +
        '<span class="card-cost">'  + upg.cost + '🪙</span>';
      btn.addEventListener('touchstart', function(ev) { ev.preventDefault(); }, { passive: false });
      btn.addEventListener('touchend',   function(ev) { ev.preventDefault(); doUpgrade(upg.key); }, { passive: false });
      btn.addEventListener('click', function() { doUpgrade(upg.key); });
      pane.appendChild(btn);
    }
  }
}

function setActiveTab(tabKey) {
  activeTab = tabKey;
  for (const k of ['atk', 'def', 'spc']) {
    const tb = document.getElementById('tab-' + k);
    const pn = document.getElementById('pane-' + k);
    if (tb) tb.classList.toggle('active', k === tabKey);
    if (pn) pn.classList.toggle('active', k === tabKey);
  }
}

function syncUI() {
  if (!G || G.phase === 'gameover') return;
  for (const upg of UPGRADES) {
    const card = document.getElementById('upg-card-' + upg.key);
    if (!card || !isUnlocked(upg.unlock)) continue;
    const statEl = document.getElementById('cs-' + upg.key);
    if (statEl) statEl.textContent = upg.stat();
    card.classList.toggle('no-gold', !upg.canBuy());
  }
}

function doUpgrade(key) {
  if (!G || G.phase !== 'playing') return;
  const upg = UPGRADES.find(function(u) { return u.key === key; });
  if (!upg || !isUnlocked(upg.unlock) || !upg.canBuy()) return;
  upg.apply();
  PERM.upgradeCount++;
  checkAchievements();
  syncUI();
}

function applyPendingHighlight() {
  if (!_pendingHighlight) return;
  const key = _pendingHighlight;
  _pendingHighlight = null;
  setTimeout(function() {
    const card = document.getElementById('upg-card-' + key);
    if (!card) return;
    card.classList.add('card-highlight');
    setTimeout(function() { card.classList.remove('card-highlight'); }, 1600);
  }, 80);
}

// Tab button bindings
(function() {
  for (const k of ['atk', 'def', 'spc']) {
    const btn = document.getElementById('tab-' + k);
    if (!btn) continue;
    btn.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
    btn.addEventListener('touchend',   function(e) { e.preventDefault(); setActiveTab(k); }, { passive: false });
    btn.addEventListener('click', function() { setActiveTab(k); });
  }
}());

/* ═══════════════════════════════════════════════════════════════
   CANVAS TAP HANDLER
═══════════════════════════════════════════════════════════════ */
function handleCanvasTap(tx, ty) {
  if (!G || G.phase === 'gameover') return;

  // Pause button hit test
  const pb = _pauseBtnRect;
  if (tx >= pb.x && tx <= pb.x + pb.w && ty >= pb.y && ty <= pb.y + pb.h) {
    openPauseMenu();
    return;
  }

  // Tower tap hit test (tower always at CW/2, CH/2 in screen coords)
  const tdx = tx - CW / 2, tdy = ty - CH / 2;
  if (tdx * tdx + tdy * tdy < 34 * 34) {
    G.showTowerStats = !G.showTowerStats;
  } else {
    G.showTowerStats = false;
  }
}

(function() {
  function tapFromMouse(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = CW / rect.width, sy = CH / rect.height;
    handleCanvasTap((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
  }
  function tapFromTouch(e) {
    e.preventDefault();
    const rect  = canvas.getBoundingClientRect();
    const sx = CW / rect.width, sy = CH / rect.height;
    const t  = e.changedTouches[0];
    handleCanvasTap((t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy);
  }
  canvas.addEventListener('click',     tapFromMouse);
  canvas.addEventListener('touchend',  tapFromTouch, { passive: false });
}());

/* ═══════════════════════════════════════════════════════════════
   PAUSE / SPEED / CONFIRM / ACHIEVEMENTS / SETTINGS
═══════════════════════════════════════════════════════════════ */
function openPauseMenu() {
  if (!G || G.phase === 'gameover') return;
  G.phase = 'paused';
  document.getElementById('pause-screen').classList.add('show');
}

function closePauseMenu() {
  document.getElementById('pause-screen').classList.remove('show');
  if (G && G.phase === 'paused') G.phase = 'playing';
}

function cycleSpeed() {
  if (!G) return;
  G.speed = (G.speed % 3) + 1;
  gameSpeed = G.speed;
  const sb = document.getElementById('speed-btn');
  if (sb) sb.textContent = G.speed + '×';
}

function showConfirm(msg, onOk) {
  _confirmCb = onOk;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-popup').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-popup').classList.remove('show');
  _confirmCb = null;
}

function buildAchieveUI() {
  const list = document.getElementById('ach-list');
  if (!list) return;
  list.innerHTML = '';
  for (const ach of ACHIEVEMENTS) {
    const claimed = PERM.achievements[ach.key] === 'claimed';
    const met     = ach.cond();
    const div = document.createElement('div');
    div.className = 'ach-item' + (claimed ? ' claimed' : '');
    div.innerHTML =
      '<span class="ach-icon">' + ach.icon + '</span>' +
      '<div class="ach-info">' +
        '<div class="ach-name">' + ach.name + '</div>' +
        '<div class="ach-desc">' + ach.desc + '</div>' +
        '<div class="ach-prog">' + ach.prog() + '</div>' +
      '</div>' +
      '<span class="ach-reward">' +
        (claimed ? '수령 완료' : (met ? '+' + ach.gems + '💎 수령!' : '+' + ach.gems + '💎')) +
      '</span>';
    list.appendChild(div);
  }
}

function syncSettingsUI() {
  for (const key of ['sound', 'music', 'vibration']) {
    const btn = document.getElementById('tog-' + key);
    if (!btn) continue;
    const on = PERM.settings[key];
    btn.className   = 'toggle-btn ' + (on ? 'on' : 'off');
    btn.textContent = on ? 'ON' : 'OFF';
  }
}

function toggleSetting(key) {
  PERM.settings[key] = !PERM.settings[key];
  savePerm();
  syncSettingsUI();
}

/* ═══════════════════════════════════════════════════════════════
   SHOP LOGIC
═══════════════════════════════════════════════════════════════ */
function openShop() {
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('screen-game').style.display = 'none';
  const home = document.getElementById('screen-home');
  home.style.display = 'flex';
  buildUnlockUI();
  syncShopUI();
}

function syncShopUI() {
  document.getElementById('s-gold').textContent = PERM.gold;
  document.getElementById('s-gems').textContent = PERM.gems;
  for (const key of Object.keys(SHOP_ITEMS)) {
    const cfg  = SHOP_ITEMS[key];
    const lv   = PERM[key + 'Lv'];
    const maxed = lv >= cfg.maxLv;
    document.getElementById('sl-' + key).textContent = 'Lv.' + lv;
    document.getElementById('se-' + key).textContent = maxed ? '최대 레벨' : cfg.effect();
    const btn = document.getElementById('sb-' + key);
    btn.classList.toggle('disabled', maxed || PERM.gold < cfg.cost);
    btn.textContent = maxed ? 'MAX' : cfg.cost + '💰';
  }
}

function shopUpgrade(key) {
  const cfg = SHOP_ITEMS[key];
  if (!cfg || PERM.gold < cfg.cost || PERM[key + 'Lv'] >= cfg.maxLv) return;
  PERM.gold -= cfg.cost;
  PERM[key + 'Lv']++;
  savePerm();
  showShopFlash();
  syncShopUI();
}

let _flashTimer = null;
function showShopFlash() {
  const el = document.getElementById('shop-flash');
  el.classList.add('show');
  clearTimeout(_flashTimer);
  _flashTimer = setTimeout(function() { el.classList.remove('show'); }, 1500);
}

/* ═══════════════════════════════════════════════════════════════
   SHOP UNLOCK SECTION
═══════════════════════════════════════════════════════════════ */
function buildUnlockUI() {
  const section = document.getElementById('unlock-section');
  if (!section) return;
  section.innerHTML = '<p class="unlock-title">🔒 특수 해금</p>';
  for (const ul of UNLOCKS) {
    const owned = !!PERM.unlocks[ul.key];
    const div = document.createElement('div');
    div.className = 'unlock-item' + (owned ? ' owned' : '');
    div.id = 'unlock-item-' + ul.key;
    div.innerHTML =
      '<div class="ui-info">' +
        '<span class="ui-name">' + ul.icon + ' ' + ul.name + '</span>' +
        '<span class="ui-desc">' + ul.desc + '</span>' +
      '</div>' +
      '<button class="ui-btn' + (owned ? ' owned-btn' : '') + '" id="unlock-btn-' + ul.key + '">' +
        (owned ? '보유' : ul.gems + '💎') +
      '</button>';
    section.appendChild(div);
    if (!owned) {
      const btn = div.querySelector('button');
      btn.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
      btn.addEventListener('touchend',   function(e) { e.preventDefault(); buyUnlock(ul.key); }, { passive: false });
      btn.addEventListener('click', function() { buyUnlock(ul.key); });
    }
  }
}

function syncUnlockUI() {
  for (const ul of UNLOCKS) {
    const owned = !!PERM.unlocks[ul.key];
    const item  = document.getElementById('unlock-item-' + ul.key);
    const btn   = document.getElementById('unlock-btn-' + ul.key);
    if (!item || !btn) continue;
    item.className = 'unlock-item' + (owned ? ' owned' : '');
    if (owned) {
      btn.className = 'ui-btn owned-btn';
      btn.textContent = '보유';
    } else {
      btn.className = 'ui-btn' + (PERM.gems < ul.gems ? ' disabled' : '');
      btn.textContent = ul.gems + '💎';
    }
  }
}

function buyUnlock(key) {
  const ul = UNLOCKS.find(function(u) { return u.key === key; });
  if (!ul || PERM.unlocks[ul.key] || PERM.gems < ul.gems) return;
  PERM.gems -= ul.gems;
  PERM.unlocks[ul.key] = true;
  savePerm();
  buildUnlockUI();
  syncShopUI();
  showShopFlash();
  // Prepare highlight for when game starts
  _pendingHighlight = ul.key;
  // Rebuild cards now to show unlocked state
  buildCards();
  // Auto-switch to the relevant tab
  setActiveTab(ul.tab);
}

function startNewGame() {
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-game').style.display = '-webkit-flex';
  document.getElementById('screen-game').style.display = 'flex';
  loopGen++;
  resizeCanvas();
  startGame();
}

/* ─── 버튼 이벤트 (touch + click) ─────────────────────────────── */
function bindOverlayBtn(id, fn) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
  el.addEventListener('touchend',   function(e) { e.preventDefault(); fn(); }, { passive: false });
  el.addEventListener('click', fn);
}

bindOverlayBtn('btn-to-shop',   openShop);
bindOverlayBtn('btn-start-game', startNewGame);
for (const key of Object.keys(SHOP_ITEMS)) {
  bindOverlayBtn('sb-' + key, shopUpgrade.bind(null, key));
}

// Speed button
bindOverlayBtn('speed-btn', cycleSpeed);

// Pause menu
bindOverlayBtn('btn-resume', closePauseMenu);
bindOverlayBtn('btn-restart', function() {
  showConfirm('다시 시작할까요?\n현재 진행 사항이 사라져요', function() {
    closeConfirm();
    document.getElementById('pause-screen').classList.remove('show');
    startNewGame();
  });
});
bindOverlayBtn('btn-home', function() {
  showConfirm('홈으로 이동할까요?\n현재 진행 사항이 사라져요', function() {
    closeConfirm();
    document.getElementById('pause-screen').classList.remove('show');
    PERM.gold = G.gold;
    PERM.gems = G.gems;
    savePerm();
    G.phase = 'gameover';
    openShop();
  });
});
bindOverlayBtn('btn-achieve', function() {
  buildAchieveUI();
  document.getElementById('achieve-screen').classList.add('show');
});
bindOverlayBtn('btn-settings', function() {
  syncSettingsUI();
  document.getElementById('settings-screen').classList.add('show');
});

// Achievement screen
bindOverlayBtn('btn-achieve-back', function() {
  document.getElementById('achieve-screen').classList.remove('show');
});

// Settings screen
bindOverlayBtn('btn-settings-back', function() {
  document.getElementById('settings-screen').classList.remove('show');
});
(function() {
  for (const k of ['sound', 'music', 'vibration']) {
    (function(key) {
      bindOverlayBtn('tog-' + key, function() { toggleSetting(key); });
    }(k));
  }
}());

// Confirm popup
bindOverlayBtn('confirm-ok', function() {
  const cb = _confirmCb;
  closeConfirm();
  if (cb) cb();
});
bindOverlayBtn('confirm-cancel', closeConfirm);

/* ─── Anti double-tap zoom ─────────────────────────────────────── */
var _lastTap = 0;
document.addEventListener('touchend', function(e) {
  var now = Date.now();
  if (now - _lastTap < 300) e.preventDefault();
  _lastTap = now;
}, { passive: false });

/* ═══════════════════════════════════════════════════════════════
   LOADING SCREEN
═══════════════════════════════════════════════════════════════ */
(function() {
  const DURATION = 1500; // ms to reach 100%
  const fill  = document.getElementById('ld-bar-fill');
  const pctEl = document.getElementById('ld-pct');
  const start = performance.now();

  function tick(now) {
    const elapsed = now - start;
    const pct = Math.min(100, Math.round((elapsed / DURATION) * 100));
    fill.style.width  = pct + '%';
    pctEl.textContent = pct + '%';

    if (pct < 100) {
      requestAnimationFrame(tick);
    } else {
      // 로딩 완료 → boot 후 전환
      resizeCanvas();
      loadPerm();

      // 1. 0.3초 대기
      setTimeout(function() {
        // 2. 로딩화면 fade out
        document.getElementById('screen-loading').style.transition = 'opacity 0.5s';
        document.getElementById('screen-loading').style.opacity    = '0';

        setTimeout(function() {
          // 3. 로딩화면 숨기기
          document.getElementById('screen-loading').style.display = 'none';

          // 4. 홈화면 표시
          const home = document.getElementById('screen-home');
          home.style.display    = 'flex';
          home.style.opacity    = '0';
          home.style.transition = 'opacity 0.5s';

          // 홈화면 데이터 준비
          buildUnlockUI();
          syncShopUI();

          // 5. 홈화면 fade in
          setTimeout(function() {
            home.style.opacity = '1';
          }, 50);

        }, 500);
      }, 300);
    }
  }

  requestAnimationFrame(tick);
}());

/* ═══════════════════════════════════════════════════════════════
   BOOT  (called from loading screen above)

<!-- ── 홈화면 전용 스크립트 (기존 코드 불변) ── -->
<script>
(function() {
  'use strict';

  /* ── 난이도 티어 설정 ── */
  var TIERS = [
    { name: '티어 1', mult: 1.0 },
    { name: '티어 2', mult: 1.5 },
    { name: '티어 3', mult: 2.0 },
    { name: '티어 4', mult: 3.0 },
    { name: '티어 5', mult: 5.0 },
  ];
  var curTier = 0;

  function applyTier() {
    var t = TIERS[curTier];
    document.getElementById('h-tier').textContent      = t.name;
    document.getElementById('h-coin-mult').textContent = '🪙 x' + t.mult.toFixed(1);
  }

  function refreshHomeData() {
    /* bestWave: PERM은 기존 script의 전역 변수 */
    try {
      document.getElementById('h-best-wave').textContent = '최고 웨이브: ' + (PERM.bestWave || 0);
    } catch (e) {}
    applyTier();
  }

  /* ── 난이도 화살표 ── */
  document.getElementById('h-diff-prev').addEventListener('click', function() {
    curTier = (curTier - 1 + TIERS.length) % TIERS.length;
    applyTier();
  });
  document.getElementById('h-diff-next').addEventListener('click', function() {
    curTier = (curTier + 1) % TIERS.length;
    applyTier();
  });

  /* ── 설정 버튼 (기존 설정 화면 연동) ── */
  var hSet = document.getElementById('h-btn-settings');
  if (hSet) {
    hSet.addEventListener('click', function() {
      try { syncSettingsUI(); } catch(e) {}
      document.getElementById('settings-screen').classList.add('show');
    });
  }

  /* ── screen-home 가시성 감지 → 데이터 갱신 ── */
  var homeEl = document.getElementById('screen-home');
  var obs = new MutationObserver(function() {
    if (homeEl.style.display && homeEl.style.display !== 'none') {
      refreshHomeData();
    }
  });
  obs.observe(homeEl, { attributes: true, attributeFilter: ['style'] });

}());
</script>
