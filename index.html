<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>타워 디펜스</title>
<style>
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
html {
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
}
body {
  width: 100%; height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
  background: #0d0d1a;
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* ─── LAYOUT ─────────────────────────────────────────────────── */
#app {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  background: #0d0d1a;
}
#canvas-area {
  -webkit-flex: 1;
  flex: 1;
  min-height: 0;
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-align-items: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}
canvas {
  display: block;
  touch-action: none;
  -ms-touch-action: none;
}

/* ─── OVERLAY SCREENS (results + shop) ───────────────────────── */
.overlay-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(5,8,20,0.96);
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
  z-index: 999;
  padding: 24px 16px 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.overlay-screen.show {
  display: -webkit-flex;
  display: flex;
}

/* ── Results screen ── */
#results-screen {
  -webkit-justify-content: center;
  justify-content: center;
  gap: 20px;
}
#results-screen h1 {
  font-size: clamp(36px, 10vw, 56px);
  color: #ef4444;
  text-shadow: 0 0 20px #ef4444, 0 0 50px #dc2626;
  font-weight: 900;
  letter-spacing: 3px;
  text-align: center;
}
.result-stats {
  width: 100%;
  max-width: 320px;
  background: #1e293b;
  border-radius: 14px;
  padding: 6px 0;
}
.stat-row {
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-align-items: center;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 1px solid #334155;
  font-size: clamp(14px, 4vw, 17px);
  color: #94a3b8;
}
.stat-row:last-child { border-bottom: none; }
.stat-val {
  font-weight: 700;
  color: #f0f9ff;
  font-size: clamp(16px, 4.5vw, 20px);
}

/* ── Shop screen ── */
#shop-screen {
  -webkit-justify-content: flex-start;
  justify-content: flex-start;
  gap: 0;
}
.shop-title {
  font-size: clamp(22px, 7vw, 32px);
  color: #fbbf24;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-shadow: 0 0 12px rgba(251,191,36,0.4);
}
.shop-currency {
  display: -webkit-flex;
  display: flex;
  gap: 24px;
  font-size: clamp(15px, 4.5vw, 18px);
  font-weight: 700;
  margin-bottom: 18px;
  color: #f0f9ff;
}
.shop-items {
  width: 100%;
  max-width: 420px;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.shop-item {
  background: #1e293b;
  border: 1px solid #2d3f5a;
  border-radius: 10px;
  padding: 12px 14px;
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-align-items: center;
  align-items: center;
  gap: 10px;
}
.si-info {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 2px;
  -webkit-flex: 1;
  flex: 1;
}
.si-name  { font-size: 14px; font-weight: 700; color: #93c5fd; }
.si-level { font-size: 11px; color: #64748b; }
.si-effect{ font-size: 12px; color: #94a3b8; }
.si-btn {
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 700;
  min-height: 44px;
  min-width: 66px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: inherit;
  white-space: nowrap;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}
.si-btn:active { background: #1d4ed8; }
.si-btn.disabled { opacity: 0.32; pointer-events: none; }

/* ── Shop unlock section ── */
#unlock-section {
  width: 100%;
  max-width: 420px;
  margin-bottom: 14px;
}
.unlock-title {
  font-size: 12px;
  font-weight: 700;
  color: #a78bfa;
  letter-spacing: 1px;
  padding: 2px 0 8px;
}
.unlock-item {
  background: #1a1f35;
  border: 1px solid #312e81;
  border-radius: 10px;
  padding: 9px 13px;
  display: -webkit-flex;
  display: flex;
  -webkit-justify-content: space-between;
  justify-content: space-between;
  -webkit-align-items: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.unlock-item.owned { opacity: 0.42; border-color: #1e293b; }
.ui-info { -webkit-flex: 1; flex: 1; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 2px; }
.ui-name { font-size: 13px; font-weight: 700; color: #c4b5fd; }
.ui-desc { font-size: 11px; color: #64748b; }
.ui-btn {
  background: #7c3aed;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 700;
  min-height: 42px;
  min-width: 58px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: inherit;
  white-space: nowrap;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}
.ui-btn:active { background: #6d28d9; }
.ui-btn.disabled  { opacity: 0.32; pointer-events: none; }
.ui-btn.owned-btn { background: #1e293b; color: #4ade80; pointer-events: none; }

/* ── Shared overlay button ── */
.ov-btn {
  background: #16a34a;
  color: #fff;
  font-size: clamp(16px, 5vw, 20px);
  font-weight: 700;
  border: none;
  border-radius: 12px;
  padding: 14px 48px;
  min-height: 54px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: inherit;
  letter-spacing: 1px;
  width: 100%;
  max-width: 320px;
}
.ov-btn:active { filter: brightness(0.85); }
.ov-btn.blue { background: #2563eb; }

/* ─── IN-GAME UPGRADE PANEL ─────────────────────────────────── */
#ui-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.75);
  z-index: 5;
  pointer-events: auto;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
}
/* ── Tab bar (row 1) ── */
#tab-bar {
  display: -webkit-flex;
  display: flex;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.tab-btn {
  -webkit-flex: 1;
  flex: 1;
  background: transparent;
  border: none;
  color: #64748b;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 4px 5px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: inherit;
  border-bottom: 2px solid transparent;
  -webkit-transition: color 0.15s, border-color 0.15s;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn.active { color: #f0f9ff; border-bottom-color: #3b82f6; }
.tab-btn:active { filter: brightness(1.3); }
/* ── Card row (row 2) ── */
#tab-content {
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 5px 6px 7px;
  scrollbar-width: none;
}
#tab-content::-webkit-scrollbar { display: none; }
.tab-pane {
  display: none;
  -webkit-flex-direction: row;
  flex-direction: row;
  gap: 5px;
  width: -webkit-max-content;
  width: max-content;
}
.tab-pane.active { display: -webkit-flex; display: flex; }
/* ── Upgrade card ── */
.upg-card {
  background: #1e293b;
  border: 1.5px solid #334155;
  border-radius: 9px;
  padding: 6px 6px 5px;
  width: 64px;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  -webkit-appearance: none;
  font-family: inherit;
  color: #f0f9ff;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.upg-card:active { filter: brightness(1.3); }
.upg-card.no-gold { border-color: #dc2626; }
.upg-card.locked  { opacity: 0.35; pointer-events: none; }
.card-icon { font-size: 15px; line-height: 1; }
.card-name { font-size: 9px; font-weight: 700; color: #cbd5e1; text-align: center; line-height: 1.2; }
.card-stat { font-size: 9px; color: #94a3b8; }
.card-cost { font-size: 10px; font-weight: 700; color: #fbbf24; }
.card-tag  { font-size: 8px; color: #475569; }
.lock-badge { position: absolute; top: 3px; right: 4px; font-size: 9px; }
/* ── Card glow animation (post-unlock) ── */
@-webkit-keyframes cardGlow {
  0%,100% { box-shadow: 0 0 0 rgba(168,85,247,0); }
  50%      { box-shadow: 0 0 14px rgba(168,85,247,0.9), 0 0 28px rgba(124,58,237,0.6); }
}
@keyframes cardGlow {
  0%,100% { box-shadow: 0 0 0 rgba(168,85,247,0); }
  50%      { box-shadow: 0 0 14px rgba(168,85,247,0.9), 0 0 28px rgba(124,58,237,0.6); }
}
.card-highlight {
  -webkit-animation: cardGlow 0.5s ease-in-out 3;
  animation: cardGlow 0.5s ease-in-out 3;
  border-color: #a855f7 !important;
}

/* ── Shop flash ── */
#shop-flash {
  font-size: 13px;
  color: #4ade80;
  font-weight: 700;
  min-height: 20px;
  margin-bottom: 6px;
  opacity: 0;
  -webkit-transition: opacity 0.25s;
  transition: opacity 0.25s;
}
#shop-flash.show { opacity: 1; }

/* ─── WAVE CLEAR BANNER ──────────────────────────────────────── */
#wave-banner {
  display: none;
  position: absolute;
  top: 38%;
  left: 50%;
  -webkit-transform: translate(-50%, -50%);
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.82);
  color: #60a5fa;
  font-size: clamp(17px, 5.5vw, 26px);
  font-weight: 700;
  padding: 12px 26px;
  border-radius: 12px;
  border: 2px solid #3b82f6;
  pointer-events: none;
  z-index: 10;
  text-align: center;
  white-space: nowrap;
  box-shadow: 0 0 20px rgba(59,130,246,0.3);
}
</style>
</head>
<body>

<div id="app">
  <div id="canvas-area">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-panel">
      <div id="tab-bar">
        <button class="tab-btn active" id="tab-atk">⚔️ 공격</button>
        <button class="tab-btn"        id="tab-def">🛡️ 방어</button>
        <button class="tab-btn"        id="tab-spc">💎 특수</button>
      </div>
      <div id="tab-content">
        <div class="tab-pane active" id="pane-atk"></div>
        <div class="tab-pane"        id="pane-def"></div>
        <div class="tab-pane"        id="pane-spc"></div>
      </div>
    </div>
    <div id="wave-banner"></div>
  </div>
</div>

<!-- ── 결과 화면 ── -->
<div id="results-screen" class="overlay-screen">
  <h1>GAME OVER</h1>
  <div class="result-stats">
    <div class="stat-row"><span>생존 웨이브</span><span class="stat-val" id="r-wave">-</span></div>
    <div class="stat-row"><span>처치한 적</span><span class="stat-val" id="r-kills">-</span></div>
    <div class="stat-row"><span>획득 골드</span><span class="stat-val" id="r-gold">-</span></div>
  </div>
  <button class="ov-btn" id="btn-to-shop">상점으로 이동</button>
</div>

<!-- ── 상점 화면 ── -->
<div id="shop-screen" class="overlay-screen">
  <h2 class="shop-title">⚒ 상 점</h2>
  <div class="shop-currency">
    <span>💰 <span id="s-gold">0</span></span>
    <span>💎 <span id="s-gems">0</span></span>
  </div>
  <div class="shop-items">
    <div class="shop-item">
      <div class="si-info">
        <span class="si-name">⚔ 공격력</span>
        <span class="si-level" id="sl-dmg">Lv.0</span>
        <span class="si-effect" id="se-dmg">3 → 4</span>
      </div>
      <button class="si-btn" id="sb-dmg">5💰</button>
    </div>
    <div class="shop-item">
      <div class="si-info">
        <span class="si-name">⚡ 공격속도</span>
        <span class="si-level" id="sl-spd">Lv.0</span>
        <span class="si-effect" id="se-spd">1.0s → 0.8s</span>
      </div>
      <button class="si-btn" id="sb-spd">7💰</button>
    </div>
    <div class="shop-item">
      <div class="si-info">
        <span class="si-name">🎯 공격범위</span>
        <span class="si-level" id="sl-rng">Lv.0</span>
        <span class="si-effect" id="se-rng">기본 → +30</span>
      </div>
      <button class="si-btn" id="sb-rng">6💰</button>
    </div>
    <div class="shop-item">
      <div class="si-info">
        <span class="si-name">❤️ 최대 체력</span>
        <span class="si-level" id="sl-hp">Lv.0</span>
        <span class="si-effect" id="se-hp">10 → 15</span>
      </div>
      <button class="si-btn" id="sb-hp">8💰</button>
    </div>
  </div>
  <div id="unlock-section"></div>
  <p id="shop-flash">✔ 영구 적용됨!</p>
  <button class="ov-btn blue" id="btn-start-game">게임 시작</button>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════════════════════════ */
const canvas   = document.getElementById('gameCanvas');
const ctx      = canvas.getContext('2d');
const areaEl   = document.getElementById('canvas-area');
const bannerEl = document.getElementById('wave-banner');

let CW = 360, CH = 640; // logical canvas dimensions

/* ── 영구 데이터 (게임 종료 후에도 유지) ── */
let PERM = {
  gold:    10,  // 시작 골드
  gems:    0,
  dmgLv:   0,
  spdLv:   0,
  rngLv:   0,
  hpLv:    0,
  unlocks: {},  // { crit: true, multi: true, ... }
};

function loadPerm() {
  try {
    const s = localStorage.getItem('td_perm');
    if (s) {
      const d = JSON.parse(s);
      PERM.gold    = d.gold    ?? 10;
      PERM.gems    = d.gems    ?? 0;
      PERM.dmgLv   = d.dmgLv  ?? 0;
      PERM.spdLv   = d.spdLv  ?? 0;
      PERM.rngLv   = d.rngLv  ?? 0;
      PERM.hpLv    = d.hpLv   ?? 0;
      PERM.unlocks = (d.unlocks && typeof d.unlocks === 'object') ? d.unlocks : {};
    }
  } catch (_) {}
}
function savePerm() {
  try { localStorage.setItem('td_perm', JSON.stringify(PERM)); } catch (_) {}
}

/* ── 상점 아이템 정의 ── */
const SHOP_ITEMS = {
  dmg: {
    cost: 5,  maxLv: 99,
    name: '⚔ 공격력',
    effect: () => (3 + PERM.dmgLv) + ' → ' + (3 + PERM.dmgLv + 1),
  },
  spd: {
    cost: 7,  maxLv: 4,
    name: '⚡ 공격속도',
    effect: () => {
      const cur  = (Math.max(200, 1000 - PERM.spdLv * 40) / 1000).toFixed(2);
      const next = (Math.max(200, 1000 - (PERM.spdLv + 1) * 40) / 1000).toFixed(2);
      return cur + 's → ' + next + 's';
    },
  },
  rng: {
    cost: 6,  maxLv: 99,
    name: '🎯 공격범위',
    effect: () => 'Lv.' + PERM.rngLv + ' → Lv.' + (PERM.rngLv + 1),
  },
  hp: {
    cost: 8,  maxLv: 99,
    name: '❤️ 최대 체력',
    effect: () => (10 + PERM.hpLv * 2) + ' → ' + (10 + (PERM.hpLv + 1) * 2),
  },
};

/* ── 인게임 업그레이드 정의 (임시) ── */
const UPGRADES = [
  // ─ 공격 탭 ─
  { key:'dmg',     tab:'atk', icon:'⚔️',  name:'공격력',   cost:5,  unlock:null,
    stat()   { return '피해 '+G.tower.dmg; },
    canBuy() { return G.gold>=5; },
    apply()  { G.gold-=5; G.tower.dmg++; },
  },
  { key:'spd',     tab:'atk', icon:'⚡',  name:'공격속도',  cost:7,  unlock:null,
    stat()   { return (G.tower.atkMs/1000).toFixed(2)+'s'; },
    canBuy() { return G.gold>=7 && G.tower.atkMs>200; },
    apply()  { G.gold-=7; G.tower.atkMs=Math.max(200,G.tower.atkMs-100); },
  },
  { key:'rng',     tab:'atk', icon:'🎯',  name:'범위',     cost:6,  unlock:null,
    stat()   { return 'Lv.'+G.rangeLevel; },
    canBuy() { return G.gold>=6; },
    apply()  { G.gold-=6; G.tower.range+=30; G.rangeLevel++; G.targetZoom=getTargetZoom(); G.flashAlpha=0.85; },
  },
  { key:'crit',    tab:'atk', icon:'💥',  name:'치명타',   cost:8,  unlock:'crit',
    stat()   { return Math.round(G.critChance*100)+'%'; },
    canBuy() { return G.gold>=8; },
    apply()  { G.gold-=8; G.critChance=Math.min(0.9,G.critChance+0.08); },
  },
  { key:'multi',   tab:'atk', icon:'🔱',  name:'다발',     cost:10, unlock:'multi',
    stat()   { return G.multiShot+'발'; },
    canBuy() { return G.gold>=10; },
    apply()  { G.gold-=10; G.multiShot++; },
  },
  { key:'pierce',  tab:'atk', icon:'🏹',  name:'관통',     cost:10, unlock:'pierce',
    stat()   { return G.pierce+'관'; },
    canBuy() { return G.gold>=10; },
    apply()  { G.gold-=10; G.pierce++; },
  },
  // ─ 방어 탭 ─
  { key:'heal',    tab:'def', icon:'❤️',  name:'회복',     cost:8,  unlock:null,
    stat()   { return G.tower.hp+'/'+G.tower.maxHp; },
    canBuy() { return G.gold>=8 && G.tower.hp<G.tower.maxHp; },
    apply()  { G.gold-=8; G.tower.hp=Math.min(G.tower.maxHp,G.tower.hp+Math.ceil(G.tower.maxHp*0.4)); },
  },
  { key:'maxhp',   tab:'def', icon:'💪',  name:'최대체력',  cost:9,  unlock:null,
    stat()   { return '최대 '+G.tower.maxHp; },
    canBuy() { return G.gold>=9; },
    apply()  { G.gold-=9; G.tower.maxHp+=3; G.tower.hp+=3; },
  },
  { key:'armor',   tab:'def', icon:'🛡️',  name:'방어구',   cost:7,  unlock:null,
    stat()   { return G.armor+'중첩'; },
    canBuy() { return G.gold>=7; },
    apply()  { G.gold-=7; G.armor++; },
  },
  { key:'vamp',    tab:'def', icon:'🩸',  name:'흡혈',     cost:9,  unlock:'vamp',
    stat()   { return G.lifeSteal+'/킬'; },
    canBuy() { return G.gold>=9; },
    apply()  { G.gold-=9; G.lifeSteal++; },
  },
  { key:'regen',   tab:'def', icon:'🌿',  name:'재생',     cost:11, unlock:'regen',
    stat()   { return G.regenRate+'/s'; },
    canBuy() { return G.gold>=11; },
    apply()  { G.gold-=11; G.regenRate++; },
  },
  // ─ 특수 탭 ─
  { key:'explode', tab:'spc', icon:'💣',  name:'폭발',     cost:15, unlock:'explode',
    stat()   { return 'r='+G.explodeR; },
    canBuy() { return G.gold>=15; },
    apply()  { G.gold-=15; G.explodeR+=15; },
  },
  { key:'slow',    tab:'spc', icon:'❄️',  name:'감속',     cost:12, unlock:'slow',
    stat()   { return Math.round(G.slowPct*100)+'%'; },
    canBuy() { return G.gold>=12; },
    apply()  { G.gold-=12; G.slowPct=Math.min(0.8,G.slowPct+0.1); },
  },
  { key:'gemup',   tab:'spc', icon:'💎',  name:'젬증폭',   cost:12, unlock:'gemup',
    stat()   { return 'x'+G.gemBonus.toFixed(1); },
    canBuy() { return G.gold>=12; },
    apply()  { G.gold-=12; G.gemBonus=parseFloat((G.gemBonus+0.5).toFixed(1)); },
  },
  { key:'goldup',  tab:'spc', icon:'🏅',  name:'골드증폭',  cost:11, unlock:'goldup',
    stat()   { return 'x'+G.goldBonus.toFixed(1); },
    canBuy() { return G.gold>=11; },
    apply()  { G.gold-=11; G.goldBonus=parseFloat((G.goldBonus+0.5).toFixed(1)); },
  },
];

function resizeCanvas() {
  const aw = areaEl.clientWidth  || window.innerWidth;
  const ah = areaEl.clientHeight || Math.floor(window.innerHeight * 0.75);
  let w, h;
  if (aw / ah < 9 / 16) {
    w = aw;
    h = Math.floor(aw * 16 / 9);
  } else {
    h = ah;
    w = Math.floor(ah * 9 / 16);
  }
  CW = w; CH = h;
  canvas.width  = w;
  canvas.height = h;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  if (G) {
    G.cx = w / 2;
    G.cy = h / 2;
    G.tower.range = Math.min(w, h) * 0.45;
  }
}
window.addEventListener('resize', resizeCanvas, false);

/* ═══════════════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════════════ */
let G       = null;
let loopGen = 0;

function createState() {
  return {
    wave:         1,
    gold:         0,   // set from PERM in startGame
    gems:         0,   // set from PERM in startGame
    phase:        'playing', // 'playing' | 'between' | 'gameover'
    betweenTimer: 0,
    killCount:    0,   // enemies killed this run
    goldEarned:   0,   // gold earned this run

    tower: {
      hp:      10,
      maxHp:   10,
      dmg:     3,
      atkMs:   1000,  // ms between shots
      range:   0,
      lastAtk: 0,
      buffMs:  0,     // ms remaining for 2× damage buff
    },

    // Zoom
    rangeLevel:  0,
    zoom:        1.0,
    targetZoom:  1.0,
    flashAlpha:  0,

    // Spawn
    spawnQ:       0,
    spawnTimer:   0,
    spawnIntvl:   800,
    isBossWave:   false,
    bossSpawned:  false,

    // Entities
    enemies: [],
    bullets: [],
    effects: [],

    // New mechanics (all temp, reset each run)
    critChance: 0,
    multiShot:  1,
    pierce:     0,
    armor:      0,
    lifeSteal:  0,
    regenRate:  0,
    regenTimer: 0,
    slowPct:    0,
    explodeR:   0,
    gemBonus:   1.0,
    goldBonus:  1.0,

    cx: CW / 2,
    cy: CH / 2,
    lastTime: 0,
  };
}

function getTargetZoom() {
  const lvl = G.rangeLevel;
  if (lvl <= 5)  return 1.00;
  if (lvl <= 10) return 0.85;
  if (lvl <= 15) return 0.70;
  if (lvl <= 20) return 0.55;
  return 0.40;
}

/* ═══════════════════════════════════════════════════════════════
   GAME INIT / WAVE START
═══════════════════════════════════════════════════════════════ */
function applyPermStats() {
  const t    = G.tower;
  t.dmg      = 3 + PERM.dmgLv;
  t.atkMs    = Math.max(200, 1000 - PERM.spdLv * 40);
  t.maxHp    = 10 + PERM.hpLv * 2;
  t.hp       = t.maxHp;
  t.range    = Math.min(CW, CH) * 0.45 + PERM.rngLv * 30;
  G.rangeLevel = 5 + PERM.rngLv; // base tier 5 → zoom 1.0 at start
  G.zoom       = getTargetZoom();
  G.targetZoom = G.zoom;
}

function startGame() {
  G = createState();
  G.gold = PERM.gold;
  G.gems = PERM.gems;
  applyPermStats();
  buildCards();
  setActiveTab(activeTab);
  applyPendingHighlight();

  // Daily gem
  try {
    const today = new Date().toDateString();
    if (localStorage.getItem('td_day') !== today) {
      G.gems += 1;
      PERM.gems += 1;
      localStorage.setItem('td_day', today);
      savePerm();
    }
  } catch (_) {}

  startWave();
  loopGen++;
  const gen = loopGen;
  G.lastTime = performance.now();
  requestAnimationFrame(function(ts) { gameLoop(gen, ts); });
}

function startWave() {
  const w = G.wave;
  G.isBossWave  = (w % 5 === 0);
  G.bossSpawned = false;
  G.spawnQ      = 5 + (w - 1) * 3;
  G.spawnIntvl  = Math.max(350, 850 - w * 18); // gets faster with waves
  G.spawnTimer  = G.spawnIntvl;
  G.phase       = 'playing';
}

/* ═══════════════════════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════════════════════ */
function gameLoop(gen, ts) {
  if (gen !== loopGen) return;
  const dt = Math.min(ts - G.lastTime, 50);
  G.lastTime = ts;
  update(dt);
  render();
  if (G.phase !== 'gameover') {
    requestAnimationFrame(function(nts) { gameLoop(gen, nts); });
  }
}

/* ═══════════════════════════════════════════════════════════════
   UPDATE
═══════════════════════════════════════════════════════════════ */
function update(dt) {
  if (G.phase === 'gameover') return;

  // Zoom smooth transition (~0.3s time constant)
  if (G.zoom !== G.targetZoom) {
    const lf = 1 - Math.exp(-dt / 80);
    G.zoom += (G.targetZoom - G.zoom) * lf;
    if (Math.abs(G.zoom - G.targetZoom) < 0.001) G.zoom = G.targetZoom;
  }

  // Flash edge decay
  if (G.flashAlpha > 0) G.flashAlpha = Math.max(0, G.flashAlpha - dt / 400);

  // Buff countdown
  if (G.tower.buffMs > 0) G.tower.buffMs = Math.max(0, G.tower.buffMs - dt);

  // Regen
  if (G.regenRate > 0) {
    G.regenTimer += dt;
    if (G.regenTimer >= 1000) {
      G.regenTimer -= 1000;
      G.tower.hp = Math.min(G.tower.maxHp, G.tower.hp + G.regenRate);
    }
  }

  // Animate leftover effects even during between phase
  for (let i = G.effects.length - 1; i >= 0; i--) {
    G.effects[i].t += dt;
    if (G.effects[i].t >= 600) G.effects.splice(i, 1);
  }

  // ── Between-wave countdown ──
  if (G.phase === 'between') {
    G.betweenTimer -= dt;
    if (G.betweenTimer <= 0) {
      G.wave++;
      startWave();
    }
    return;
  }

  // ── Spawn enemies ──
  const needBoss = G.isBossWave && !G.bossSpawned && G.spawnQ === 0;
  if (G.spawnQ > 0 || needBoss) {
    G.spawnTimer -= dt;
    if (G.spawnTimer <= 0) {
      if (G.spawnQ > 0) {
        G.enemies.push(mkEnemy(false));
        G.spawnQ--;
        G.spawnTimer = G.spawnIntvl;
      } else if (G.isBossWave && !G.bossSpawned) {
        G.enemies.push(mkEnemy(true));
        G.bossSpawned = true;
      }
    }
  }

  // ── Tower fires ──
  G.tower.lastAtk += dt;
  if (G.tower.lastAtk >= G.tower.atkMs) {
    G.tower.lastAtk -= G.tower.atkMs;
    fireTower();
  }

  // ── Move bullets ──
  const bSpd = Math.min(CW, CH) * 0.022; // px per frame @60fps
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    const mv = bSpd * (dt / 16.667);
    b.x += b.dx * mv;
    b.y += b.dy * mv;

    if (b.x < -80 || b.x > CW + 80 || b.y < -80 || b.y > CH + 80) {
      G.bullets.splice(i, 1);
      continue;
    }

    let removeBullet = false;
    for (let j = G.enemies.length - 1; j >= 0; j--) {
      const e = G.enemies[j];
      if (b.hitSet && b.hitSet.has(e)) continue; // already hit by this piercing bullet
      const ddx = b.x - e.x, ddy = b.y - e.y;
      if (ddx * ddx + ddy * ddy < (e.r + 5) * (e.r + 5)) {
        if (b.hitSet) b.hitSet.add(e);
        let dmg = G.tower.buffMs > 0 ? G.tower.dmg * 2 : G.tower.dmg;
        if (b.crit) dmg *= 2;
        // Slow on hit
        if (G.slowPct > 0) e.slowTimer = 1500;
        e.hp -= dmg;

        if (e.hp <= 0) {
          const gEarned  = Math.floor(e.gold * G.goldBonus);
          const gmEarned = e.gem ? Math.floor(e.gem * G.gemBonus) : 0;
          G.gold       += gEarned;
          G.gems       += gmEarned;
          G.killCount++;
          G.goldEarned += gEarned;
          // Life steal
          if (G.lifeSteal > 0) {
            G.tower.hp = Math.min(G.tower.maxHp, G.tower.hp + G.lifeSteal);
          }
          // Explosion AOE
          if (G.explodeR > 0) {
            const ex = e.x, ey = e.y;
            const exDmg = Math.max(1, Math.floor(G.tower.dmg * 0.5));
            addFx(ex, ey, G.explodeR, '#f97316');
            for (let k = G.enemies.length - 1; k >= 0; k--) {
              const ek = G.enemies[k];
              if (ek === e) continue;
              const edx = ek.x - ex, edy = ek.y - ey;
              if (edx * edx + edy * edy < G.explodeR * G.explodeR) {
                ek.hp -= exDmg;
                if (ek.hp <= 0) {
                  G.gold       += Math.floor(ek.gold * G.goldBonus);
                  G.killCount++;
                  G.goldEarned += Math.floor(ek.gold * G.goldBonus);
                  addFx(ek.x, ek.y, ek.r * 2.8, '#f97316');
                  G.enemies.splice(k, 1);
                  if (k <= j) j--;
                }
              }
            }
          } else {
            addFx(e.x, e.y, e.r * 2.8, e.boss ? '#f97316' : '#ef4444');
          }
          G.enemies.splice(j, 1);
        }

        // Pierce: bullet keeps going if pierceLeft > 0
        if (b.pierceLeft > 0) {
          b.pierceLeft--;
        } else {
          removeBullet = true;
          break;
        }
      }
    }
    if (removeBullet) G.bullets.splice(i, 1);
  }

  // ── Move enemies toward tower ──
  const TOWER_HIT_R = 18;
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    const dx = G.cx - e.x, dy = G.cy - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < TOWER_HIT_R + e.r) {
      const dmgTaken = Math.max(1, Math.round(1 - G.armor * 0.05));
      G.tower.hp = Math.max(0, G.tower.hp - dmgTaken);
      addFx(e.x, e.y, e.r * 2, '#f87171');
      G.enemies.splice(i, 1);
      if (G.tower.hp <= 0) { triggerGameOver(); return; }
      continue;
    }

    // Slow tick
    if (e.slowTimer > 0) e.slowTimer = Math.max(0, e.slowTimer - dt);
    const spdMult = (e.slowTimer > 0) ? (1 - G.slowPct) : 1;
    const mv = e.spd * spdMult * (dt / 16.667);
    e.x += (dx / dist) * mv;
    e.y += (dy / dist) * mv;
  }

  // ── Check wave complete ──
  const spawnDone = G.spawnQ === 0 && (!G.isBossWave || G.bossSpawned);
  if (spawnDone && G.enemies.length === 0 && G.phase === 'playing') {
    onWaveComplete();
  }

  syncUI();
}

function mkEnemy(isBoss) {
  // Spawn just outside the visible area (accounts for zoom-out world expansion)
  const zoom  = G.zoom;
  const halfW = CW / (2 * zoom); // visible half-width in game coords
  const halfH = CH / (2 * zoom);
  const m     = 50;              // extra margin beyond screen edge
  let x, y;
  const side = (Math.random() * 4) | 0;
  if (side === 0) {        // top
    x = CW/2 + (Math.random() - 0.5) * 2 * (halfW + m);
    y = CH/2 - halfH - m;
  } else if (side === 1) { // bottom
    x = CW/2 + (Math.random() - 0.5) * 2 * (halfW + m);
    y = CH/2 + halfH + m;
  } else if (side === 2) { // left
    x = CW/2 - halfW - m;
    y = CH/2 + (Math.random() - 0.5) * 2 * (halfH + m);
  } else {                 // right
    x = CW/2 + halfW + m;
    y = CH/2 + (Math.random() - 0.5) * 2 * (halfH + m);
  }

  const w       = G.wave;
  const baseHp  = isBoss ? 20 : 2 + (w - 1) * 0.5;          // +0.5 HP per wave
  const baseSpd = isBoss ? 0.51 : 0.81 * Math.pow(1.02, w - 1); // +2% speed per wave

  return {
    x, y,
    boss:      isBoss,
    hp:        baseHp,
    maxHp:     baseHp,
    r:         isBoss ? 17  : 9,
    spd:       baseSpd,
    gold:      isBoss ? 5   : 1,
    gem:       isBoss ? 1   : 0,
    slowTimer: 0,
  };
}

function fireTower() {
  let target = null, minD = G.tower.range + 1;
  for (const e of G.enemies) {
    const dx = e.x - G.cx, dy = e.y - G.cy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < minD) { minD = d; target = e; }
  }
  if (!target) return;
  const baseAngle = Math.atan2(target.y - G.cy, target.x - G.cx);
  const shots     = Math.max(1, G.multiShot);
  const spread    = 0.18; // radians between bullets
  for (let s = 0; s < shots; s++) {
    const offset = (s - (shots - 1) / 2) * spread;
    const angle  = baseAngle + offset;
    const isCrit = G.critChance > 0 && Math.random() < G.critChance;
    G.bullets.push({
      x: G.cx, y: G.cy,
      dx: Math.cos(angle), dy: Math.sin(angle),
      crit: isCrit,
      pierceLeft: G.pierce,
      hitSet: G.pierce > 0 ? new Set() : null,
    });
  }
}

function addFx(x, y, maxR, color) {
  G.effects.push({ x, y, maxR, color, t: 0 });
}

function onWaveComplete() {
  G.phase = 'between';
  G.betweenTimer = 3000;
  if (G.wave % 10 === 0) G.gems += 2; // 10-wave milestone bonus
  bannerEl.textContent = '🎉 웨이브 ' + G.wave + ' 클리어!';
  bannerEl.style.display = 'block';
  setTimeout(function() { bannerEl.style.display = 'none'; }, 2000);
}

function triggerGameOver() {
  G.phase    = 'gameover';
  PERM.gold  = G.gold;   // 남은 골드 보존
  PERM.gems  = G.gems;
  savePerm();
  document.getElementById('r-wave').textContent  = G.wave;
  document.getElementById('r-kills').textContent = G.killCount;
  document.getElementById('r-gold').textContent  = '💰 ' + G.goldEarned;
  document.getElementById('results-screen').classList.add('show');
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════ */
function render() {
  // ── 1. Background (full canvas, before zoom) ──────────────────
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, CW, CH);

  // ── 2. Game world (zoom transform applied) ────────────────────
  ctx.save();
  ctx.translate(CW / 2, CH / 2);
  ctx.scale(G.zoom, G.zoom);
  ctx.translate(-CW / 2, -CH / 2);

  // Visible game-coord bounds when zoomed out
  const visW = CW / G.zoom;
  const visH = CH / G.zoom;
  const ox   = (CW - visW) / 2; // negative when zoomed out
  const oy   = (CH - visH) / 2;

  // Grid (extended to fill visible area)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  const gs = Math.floor(CW / 9);
  for (let x = Math.floor(ox / gs) * gs; x <= ox + visW + gs; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, oy); ctx.lineTo(x, oy + visH); ctx.stroke();
  }
  for (let y = Math.floor(oy / gs) * gs; y <= oy + visH + gs; y += gs) {
    ctx.beginPath(); ctx.moveTo(ox, y); ctx.lineTo(ox + visW, y); ctx.stroke();
  }

  // Attack range circle
  ctx.beginPath();
  ctx.arc(G.cx, G.cy, G.tower.range, 0, Math.PI * 2);
  ctx.setLineDash([6, 6]);
  ctx.strokeStyle = 'rgba(59,130,246,0.22)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(59,130,246,0.04)';
  ctx.fill();
  ctx.setLineDash([]);

  // Targeting line to nearest in-range enemy
  {
    let nearest = null, nd = G.tower.range + 1;
    for (const e of G.enemies) {
      const dx = e.x - G.cx, dy = e.y - G.cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < nd) { nd = d; nearest = e; }
    }
    if (nearest) {
      ctx.save();
      ctx.strokeStyle = 'rgba(251,191,36,0.22)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(G.cx, G.cy);
      ctx.lineTo(nearest.x, nearest.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // Effects (death rings)
  for (const ef of G.effects) {
    const t = ef.t / 600;
    ctx.save();
    ctx.globalAlpha = (1 - t) * 0.85;
    ctx.beginPath();
    ctx.arc(ef.x, ef.y, ef.maxR * t, 0, Math.PI * 2);
    ctx.strokeStyle = ef.color;
    ctx.lineWidth = Math.max(0.5, 3 - t * 2.5);
    ctx.stroke();
    ctx.restore();
  }

  // Enemies
  for (const e of G.enemies) {
    const slowed = e.slowTimer > 0;
    ctx.save();
    ctx.shadowBlur  = e.boss ? 22 : 10;
    ctx.shadowColor = slowed ? '#60a5fa' : (e.boss ? '#f97316' : '#ef4444');
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fillStyle   = slowed ? (e.boss ? '#1e3a8a' : '#1d4ed8') : (e.boss ? '#c2410c' : '#b91c1c');
    ctx.fill();
    ctx.strokeStyle = slowed ? '#93c5fd' : (e.boss ? '#fb923c' : '#f87171');
    ctx.lineWidth   = e.boss ? 2.5 : 1.5;
    ctx.stroke();
    ctx.shadowBlur  = 0;
    if (e.boss) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.floor(e.r * 0.82) + 'px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('B', e.x, e.y);
    }
    const bw = e.r * 2.6, bh = e.boss ? 6 : 4;
    const bx = e.x - bw / 2, by = e.y - e.r - bh - 4;
    const hr = e.hp / e.maxHp;
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = hr > 0.6 ? '#16a34a' : hr > 0.3 ? '#ca8a04' : '#dc2626';
    ctx.fillRect(bx, by, bw * hr, bh);
    ctx.restore();
  }

  // Bullets
  for (const b of G.bullets) {
    ctx.save();
    ctx.shadowBlur  = b.crit ? 12 : 8;
    ctx.shadowColor = b.crit ? '#f97316' : '#fbbf24';
    ctx.fillStyle   = b.crit ? '#fb923c' : '#fde68a';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.crit ? 4 : 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Tower
  const TS = 26;
  const buffed = G.tower.buffMs > 0;
  ctx.save();
  ctx.shadowBlur  = 22;
  ctx.shadowColor = buffed ? '#f97316' : '#3b82f6';
  ctx.fillStyle   = buffed ? '#fdba74' : '#7dd3fc';
  ctx.fillRect(G.cx - TS/2, G.cy - TS/2, TS, TS);
  ctx.strokeStyle = buffed ? '#ea580c' : '#2563eb';
  ctx.lineWidth   = 3;
  ctx.strokeRect(G.cx - TS/2, G.cy - TS/2, TS, TS);
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = buffed ? '#9a3412' : '#1e40af';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(G.cx, G.cy - TS/2 + 6); ctx.lineTo(G.cx, G.cy + TS/2 - 6);
  ctx.moveTo(G.cx - TS/2 + 6, G.cy); ctx.lineTo(G.cx + TS/2 - 6, G.cy);
  ctx.stroke();
  ctx.restore();

  ctx.restore(); // ← end zoom transform

  // ── 3. Edge flash (full screen, no zoom) ─────────────────────
  if (G.flashAlpha > 0) {
    const r = Math.max(CW, CH);
    const grad = ctx.createRadialGradient(CW/2, CH/2, r * 0.05, CW/2, CH/2, r * 0.9);
    grad.addColorStop(0,    'rgba(148,218,255,0)');
    grad.addColorStop(0.55, 'rgba(148,218,255,0)');
    grad.addColorStop(1,    'rgba(148,218,255,' + (G.flashAlpha * 0.55) + ')');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CW, CH);
  }

  // ── 4. HUD (full screen, no zoom) ────────────────────────────
  renderHUD();
}

function renderHUD() {
  const pad = 10;
  const fs1 = Math.max(13, Math.floor(CW * 0.042)); // headline
  const fs2 = Math.max(11, Math.floor(CW * 0.033)); // body

  ctx.save();

  // ─ Wave label ─
  ctx.textBaseline = 'top';
  ctx.font         = 'bold ' + fs1 + 'px Arial';
  ctx.fillStyle    = '#93c5fd';
  ctx.fillText('웨이브 ' + G.wave + (G.isBossWave ? ' 👑' : ''), pad, pad);

  // ─ Tower HP bar ─
  const barW = CW * 0.38;
  const barH = Math.max(14, Math.floor(CH * 0.018));
  const barX = pad, barY = pad + fs1 + 5;
  const hr   = G.tower.hp / G.tower.maxHp;

  ctx.fillStyle = '#0f172a';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = hr > 0.5 ? '#16a34a' : hr > 0.25 ? '#ca8a04' : '#dc2626';
  ctx.fillRect(barX, barY, barW * hr, barH);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth   = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  ctx.font         = 'bold ' + Math.max(11, fs2 - 1) + 'px Arial';
  ctx.fillStyle    = '#f0f9ff';
  ctx.textBaseline = 'middle';
  ctx.fillText(G.tower.hp + '/' + G.tower.maxHp, barX + 4, barY + barH / 2);

  // ─ Gold & Gems (right) ─
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'top';
  ctx.font         = 'bold ' + fs1 + 'px Arial';
  ctx.fillStyle    = '#fbbf24';
  ctx.fillText('💰 ' + G.gold, CW - pad, pad);
  ctx.fillStyle = '#a78bfa';
  ctx.fillText('💎 ' + G.gems, CW - pad, pad + fs1 + 5);
  ctx.textAlign = 'left';

  // ─ Buff timer (center top) ─
  if (G.tower.buffMs > 0) {
    const sec = Math.ceil(G.tower.buffMs / 1000);
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    ctx.font         = 'bold ' + fs2 + 'px Arial';
    ctx.fillStyle    = '#fb923c';
    ctx.fillText('⚡ 공격 2배 ' + sec + 's', G.cx, pad);
    ctx.textAlign = 'left';
  }

  // ─ Between-wave countdown overlay ─
  if (G.phase === 'between') {
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.fillRect(0, 0, CW, CH);

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    const bigF = Math.floor(CW * 0.17);
    const sec  = Math.ceil(G.betweenTimer / 1000);
    const nextW = G.wave + 1;
    const nextBoss = nextW % 5 === 0;

    ctx.font      = 'bold ' + Math.floor(CW * 0.065) + 'px Arial';
    ctx.fillStyle = '#60a5fa';
    ctx.fillText('다음 웨이브까지', G.cx, G.cy - bigF * 0.75);

    ctx.font      = 'bold ' + bigF + 'px Arial';
    ctx.fillStyle = '#f0f9ff';
    ctx.fillText(sec, G.cx, G.cy + bigF * 0.08);

    ctx.font      = 'bold ' + Math.floor(CW * 0.048) + 'px Arial';
    ctx.fillStyle = nextBoss ? '#fb923c' : '#64748b';
    ctx.fillText(
      '웨이브 ' + nextW + (nextBoss ? '  👑 보스 등장!' : '  준비'),
      G.cx, G.cy + bigF * 1.0
    );

    ctx.textAlign = 'left';
  }

  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════════
   IN-GAME UPGRADES (임시) — 탭 시스템
═══════════════════════════════════════════════════════════════ */
let activeTab = 'atk';
let _pendingHighlight = null;

function isUnlocked(key) {
  return !key || !!PERM.unlocks[key];
}

function buildCards() {
  for (const tabKey of ['atk', 'def', 'spc']) {
    const pane = document.getElementById('pane-' + tabKey);
    if (!pane) continue;
    pane.innerHTML = '';
    for (const upg of UPGRADES) {
      if (upg.tab !== tabKey) continue;
      const locked = !isUnlocked(upg.unlock);
      const btn = document.createElement('button');
      btn.id        = 'upg-card-' + upg.key;
      btn.className = 'upg-card' + (locked ? ' locked' : '');
      const ulDef = locked ? UNLOCKS.find(function(u){ return u.key === upg.unlock; }) : null;
      const costStr = locked ? ((ulDef ? ulDef.gems : '?') + '💎') : upg.cost + '💰';
      btn.innerHTML =
        '<span class="card-icon">' + upg.icon + '</span>' +
        '<span class="card-name">' + upg.name + '</span>' +
        '<span class="card-stat" id="cs-' + upg.key + '">' + (locked ? '🔒' : upg.stat()) + '</span>' +
        '<span class="card-cost">' + costStr + '</span>' +
        '<span class="card-tag">'  + (locked ? '상점해제' : '임시') + '</span>';
      if (!locked) {
        btn.addEventListener('touchstart', function(ev) { ev.preventDefault(); }, { passive: false });
        btn.addEventListener('touchend',   function(ev) { ev.preventDefault(); doUpgrade(upg.key); }, { passive: false });
        btn.addEventListener('click', function() { doUpgrade(upg.key); });
      }
      pane.appendChild(btn);
    }
  }
}

function setActiveTab(tabKey) {
  activeTab = tabKey;
  for (const k of ['atk', 'def', 'spc']) {
    const tb = document.getElementById('tab-' + k);
    const pn = document.getElementById('pane-' + k);
    if (tb) tb.classList.toggle('active', k === tabKey);
    if (pn) pn.classList.toggle('active', k === tabKey);
  }
}

function syncUI() {
  if (!G || G.phase === 'gameover') return;
  for (const upg of UPGRADES) {
    const card = document.getElementById('upg-card-' + upg.key);
    if (!card || !isUnlocked(upg.unlock)) continue;
    const statEl = document.getElementById('cs-' + upg.key);
    if (statEl) statEl.textContent = upg.stat();
    card.classList.toggle('no-gold', !upg.canBuy());
  }
}

function doUpgrade(key) {
  if (!G || G.phase !== 'playing') return;
  const upg = UPGRADES.find(function(u) { return u.key === key; });
  if (!upg || !isUnlocked(upg.unlock) || !upg.canBuy()) return;
  upg.apply();
  syncUI();
}

function applyPendingHighlight() {
  if (!_pendingHighlight) return;
  const key = _pendingHighlight;
  _pendingHighlight = null;
  setTimeout(function() {
    const card = document.getElementById('upg-card-' + key);
    if (!card) return;
    card.classList.add('card-highlight');
    setTimeout(function() { card.classList.remove('card-highlight'); }, 1600);
  }, 80);
}

// Tab button bindings
(function() {
  for (const k of ['atk', 'def', 'spc']) {
    const btn = document.getElementById('tab-' + k);
    if (!btn) continue;
    btn.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
    btn.addEventListener('touchend',   function(e) { e.preventDefault(); setActiveTab(k); }, { passive: false });
    btn.addEventListener('click', function() { setActiveTab(k); });
  }
}());

/* ═══════════════════════════════════════════════════════════════
   SHOP LOGIC
═══════════════════════════════════════════════════════════════ */
function openShop() {
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('shop-screen').classList.add('show');
  buildUnlockUI();
  syncShopUI();
}

function syncShopUI() {
  document.getElementById('s-gold').textContent = PERM.gold;
  document.getElementById('s-gems').textContent = PERM.gems;
  for (const key of Object.keys(SHOP_ITEMS)) {
    const cfg  = SHOP_ITEMS[key];
    const lv   = PERM[key + 'Lv'];
    const maxed = lv >= cfg.maxLv;
    document.getElementById('sl-' + key).textContent = 'Lv.' + lv;
    document.getElementById('se-' + key).textContent = maxed ? '최대 레벨' : cfg.effect();
    const btn = document.getElementById('sb-' + key);
    btn.classList.toggle('disabled', maxed || PERM.gold < cfg.cost);
    btn.textContent = maxed ? 'MAX' : cfg.cost + '💰';
  }
}

function shopUpgrade(key) {
  const cfg = SHOP_ITEMS[key];
  if (!cfg || PERM.gold < cfg.cost || PERM[key + 'Lv'] >= cfg.maxLv) return;
  PERM.gold -= cfg.cost;
  PERM[key + 'Lv']++;
  savePerm();
  showShopFlash();
  syncShopUI();
}

let _flashTimer = null;
function showShopFlash() {
  const el = document.getElementById('shop-flash');
  el.classList.add('show');
  clearTimeout(_flashTimer);
  _flashTimer = setTimeout(function() { el.classList.remove('show'); }, 1500);
}

/* ═══════════════════════════════════════════════════════════════
   SHOP UNLOCK SECTION
═══════════════════════════════════════════════════════════════ */
function buildUnlockUI() {
  const section = document.getElementById('unlock-section');
  if (!section) return;
  section.innerHTML = '<p class="unlock-title">🔒 특수 해금</p>';
  for (const ul of UNLOCKS) {
    const owned = !!PERM.unlocks[ul.key];
    const div = document.createElement('div');
    div.className = 'unlock-item' + (owned ? ' owned' : '');
    div.id = 'unlock-item-' + ul.key;
    div.innerHTML =
      '<div class="ui-info">' +
        '<span class="ui-name">' + ul.icon + ' ' + ul.name + '</span>' +
        '<span class="ui-desc">' + ul.desc + '</span>' +
      '</div>' +
      '<button class="ui-btn' + (owned ? ' owned-btn' : '') + '" id="unlock-btn-' + ul.key + '">' +
        (owned ? '보유' : ul.gems + '💎') +
      '</button>';
    section.appendChild(div);
    if (!owned) {
      const btn = div.querySelector('button');
      btn.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
      btn.addEventListener('touchend',   function(e) { e.preventDefault(); buyUnlock(ul.key); }, { passive: false });
      btn.addEventListener('click', function() { buyUnlock(ul.key); });
    }
  }
}

function syncUnlockUI() {
  for (const ul of UNLOCKS) {
    const owned = !!PERM.unlocks[ul.key];
    const item  = document.getElementById('unlock-item-' + ul.key);
    const btn   = document.getElementById('unlock-btn-' + ul.key);
    if (!item || !btn) continue;
    item.className = 'unlock-item' + (owned ? ' owned' : '');
    if (owned) {
      btn.className = 'ui-btn owned-btn';
      btn.textContent = '보유';
    } else {
      btn.className = 'ui-btn' + (PERM.gems < ul.gems ? ' disabled' : '');
      btn.textContent = ul.gems + '💎';
    }
  }
}

function buyUnlock(key) {
  const ul = UNLOCKS.find(function(u) { return u.key === key; });
  if (!ul || PERM.unlocks[ul.key] || PERM.gems < ul.gems) return;
  PERM.gems -= ul.gems;
  PERM.unlocks[ul.key] = true;
  savePerm();
  buildUnlockUI();
  syncShopUI();
  showShopFlash();
  // Prepare highlight for when game starts
  _pendingHighlight = ul.key;
  // Rebuild cards now to show unlocked state
  buildCards();
  // Auto-switch to the relevant tab
  setActiveTab(ul.tab);
}

function startNewGame() {
  document.getElementById('shop-screen').classList.remove('show');
  bannerEl.style.display = 'none';
  loopGen++;
  resizeCanvas();
  startGame();
}

/* ─── 버튼 이벤트 (touch + click) ─────────────────────────────── */
function bindOverlayBtn(id, fn) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
  el.addEventListener('touchend',   function(e) { e.preventDefault(); fn(); }, { passive: false });
  el.addEventListener('click', fn);
}

bindOverlayBtn('btn-to-shop',   openShop);
bindOverlayBtn('btn-start-game', startNewGame);
for (const key of Object.keys(SHOP_ITEMS)) {
  bindOverlayBtn('sb-' + key, shopUpgrade.bind(null, key));
}

/* ─── Anti double-tap zoom ─────────────────────────────────────── */
var _lastTap = 0;
document.addEventListener('touchend', function(e) {
  var now = Date.now();
  if (now - _lastTap < 300) e.preventDefault();
  _lastTap = now;
}, { passive: false });

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
resizeCanvas();
loadPerm();
buildCards();
setActiveTab('atk');
startGame();
</script>
